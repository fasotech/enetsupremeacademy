<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENET SUPREME ACADEMY | Create Account</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy-blue: #2C1E85; --brand-red: #DA251D; --red-hover: #B81D15; --text-main: #333333; --background: #F8F9FA; --white: #FFFFFF; --border: #E2E8F0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--background); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1.5rem; }
        .auth-logo { color: var(--navy-blue); font-size: 2rem; font-weight: 800; margin-bottom: 1.5rem; text-transform: uppercase; text-align: center; }
        .auth-logo span { color: var(--brand-red); }
        .auth-card { background: var(--white); max-width: 500px; width: 100%; padding: 2.5rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid var(--navy-blue); }
        
        h2 { text-align: center; color: var(--navy-blue); margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 500; font-size: 0.9rem;}
        input, select { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 4px; font-size: 1rem; }
        .btn-primary { width: 100%; background-color: var(--brand-red); color: white; border: none; padding: 1rem; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 1rem; }
        .btn-primary:hover { background-color: var(--red-hover); }
        
        #auth-message { margin-bottom: 1rem; font-size: 0.9rem; text-align: center; font-weight: bold; padding: 0.8rem; border-radius: 4px; display: none; }
        .login-link { display: block; text-align: center; margin-top: 1.5rem; color: #666; text-decoration: none; font-size: 0.9rem; }
        .login-link span { color: var(--brand-red); font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-logo">ENET SUPREME <br><span>ACADEMY</span></div>
    
    <section class="auth-card">
        <h2>Submit Application</h2>
        <p style="text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem; color: #666;">Fill out the form below. Your account will be reviewed by an Administrator.</p>
        
        <div id="auth-message"></div>
        
        <form id="register-form">
            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;"><label>First Name</label><input type="text" id="reg-first" required></div>
                <div class="form-group" style="flex: 1;"><label>Last Name</label><input type="text" id="reg-last" required></div>
            </div>
            <div class="form-group">
                <label>I am applying as a:</label>
                <select id="reg-role" required>
                    <option value="student">Student</option>
                    <option value="teacher">Teacher / Instructor</option>
                </select>
            </div>
            <div class="form-group"><label>Email Address</label><input type="email" id="reg-email" required placeholder="your@email.com"></div>
            <div class="form-group"><label>Create Password</label><input type="password" id="reg-password" required minlength="6" placeholder="Minimum 6 characters"></div>
            
            <button type="submit" class="btn-primary" id="reg-btn">Create Account</button>
        </form>

        <a href="login.html" class="login-link">Already have an approved account? <span>Log In here</span></a>
    </section>

    <script>
        const supabaseUrl = 'https://lskwzcvexyxjncttvimf.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxza3d6Y3ZleHl4am5jdHR2aW1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTIzNjEsImV4cCI6MjA4ODU4ODM2MX0.W8sEQ2ZtmBe-oqsznCX_UinJ2Jz2NNe0LuQct33VP2E'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        const msgDiv = document.getElementById('auth-message');

        function showMessage(text, isError) {
            msgDiv.style.display = 'block';
            msgDiv.style.backgroundColor = isError ? '#fee2e2' : '#E0E7FF';
            msgDiv.style.color = isError ? '#DC2626' : '#2C1E85';
            msgDiv.innerText = text;
        }

        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            btn.disabled = true;
            showMessage('Submitting application...', false);

            try {
                const { data, error } = await supabase.auth.signUp({
                    email: document.getElementById('reg-email').value,
                    password: document.getElementById('reg-password').value,
                    options: {
                        data: {
                            first_name: document.getElementById('reg-first').value,
                            last_name: document.getElementById('reg-last').value,
                            requested_role: document.getElementById('reg-role').value
                        }
                    }
                });

                if (error) throw new Error(error.message);

                showMessage("Application successful! An Admin will review your account shortly.", false);
                document.getElementById('register-form').reset();

            } catch (err) {
                showMessage("Error: " + err.message, true);
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
