<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENET SUPREME ACADEMY | Create Account</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy-blue: #2C1E85; --brand-red: #DA251D; --red-hover: #B81D15; --text-main: #333333; --background: #F8F9FA; --white: #FFFFFF; --border: #E2E8F0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--background); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1.5rem; }
        .auth-logo { color: var(--navy-blue); font-size: 2rem; font-weight: 800; margin-bottom: 1.5rem; text-transform: uppercase; text-align: center; }
        .auth-logo span { color: var(--brand-red); }
        .auth-card { background: var(--white); max-width: 500px; width: 100%; padding: 2.5rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid var(--navy-blue); }
        h2 { text-align: center; color: var(--navy-blue); margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 500; font-size: 0.9rem;}
        input, select { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 4px; font-size: 1rem; }
        .btn-primary { width: 100%; background-color: var(--brand-red); color: white; border: none; padding: 1rem; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 1rem; }
        .btn-primary:hover { background-color: var(--red-hover); }
        .btn-primary:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        .login-link { display: block; text-align: center; margin-top: 1.5rem; color: #666; text-decoration: none; font-size: 0.9rem; }
        .login-link span { color: var(--brand-red); font-weight: bold; }
        #success-screen { display: none; text-align: center; padding: 2rem 0; }
        #success-screen h3 { color: var(--navy-blue); font-size: 1.8rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="auth-logo">ENET SUPREME <br><span>ACADEMY</span></div>
    
    <section class="auth-card">
        <div id="form-container">
            <h2>Submit Application</h2>
            
            <form id="register-form">
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;"><label>First Name</label><input type="text" id="reg-first" required></div>
                    <div class="form-group" style="flex: 1;"><label>Last Name</label><input type="text" id="reg-last" required></div>
                </div>
                <div class="form-group">
                    <label>I am applying as a:</label>
                    <select id="reg-role" required>
                        <option value="student">Student</option>
                        <option value="teacher">Teacher / Instructor</option>
                    </select>
                </div>
                <div class="form-group"><label>Email Address</label><input type="email" id="reg-email" required></div>
                <div class="form-group"><label>Create Password</label><input type="password" id="reg-password" required minlength="6"></div>
                <button type="submit" class="btn-primary" id="reg-btn">Submit Application</button>
            </form>

            <a href="login.html" class="login-link">Already have an approved account? <span>Log In here</span></a>
        </div>

        <div id="success-screen">
            <h3>Application Received!</h3>
            <p>Your account has been successfully created.</p>
            <p style="font-weight: bold; color: var(--brand-red); padding: 1rem; border: 2px solid var(--brand-red); border-radius: 8px; margin: 1.5rem 0;">
                Please wait for an Administrator to approve your access before attempting to log in.
            </p>
            <button type="button" onclick="window.location.href='index.html'" class="btn-primary" style="background-color: var(--navy-blue);">Return to Homepage</button>
        </div>
    </section>

    <script>
        // 1. Initialize Supabase
        const supabaseUrl = 'https://lskwzcvexyxjncttvimf.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxza3d6Y3ZleHl4am5jdHR2aW1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTIzNjEsImV4cCI6MjA4ODU4ODM2MX0.W8sEQ2ZtmBe-oqsznCX_UinJ2Jz2NNe0LuQct33VP2E'; 
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // 2. Attach the Event Listener directly to the form
        const registerForm = document.getElementById('register-form');
        const regBtn = document.getElementById('reg-btn');

        registerForm.addEventListener('submit', async function(e) {
            // This firmly blocks the page reload and the '?' in the URL
            e.preventDefault(); 
            
            // Immediate visual feedback so we know the button is alive
            regBtn.disabled = true;
            regBtn.innerText = "Processing... Please wait";

            try {
                // Grab the values
                const firstName = document.getElementById('reg-first').value;
                const lastName = document.getElementById('reg-last').value;
                const role = document.getElementById('reg-role').value;
                const email = document.getElementById('reg-email').value;
                const password = document.getElementById('reg-password').value;

                // Step A: Create Auth Account
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password
                });
                
                // If Auth fails (e.g., email already exists), throw error to the catch block
                if (authError) throw authError;

                // Step B: Inject directly into profiles table instantly
                if (authData && authData.user) {
                    const { error: dbError } = await supabaseClient.from('profiles').insert([{
                        id: authData.user.id,
                        first_name: firstName,
                        last_name: lastName,
                        email: email,
                        role: role,
                        status: 'pending'
                    }]);
                    
                    // If DB insertion fails, throw error to the catch block
                    if (dbError) throw new Error("Database Error: " + dbError.message);
                }

                // Step C: If everything succeeded, show Success Screen
                document.getElementById('form-container').style.display = 'none';
                document.getElementById('success-screen').style.display = 'block';

            } catch (err) {
                // If ANYTHING fails, this popup will tell us exactly why.
                alert("Registration Failed: " + err.message);
                
                // Reset the button so the user can try again
                regBtn.disabled = false;
                regBtn.innerText = "Submit Application";
            }
        });
    </script>
</body>
</html>
