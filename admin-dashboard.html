<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENET SUPREME ACADEMY | Admin Hub</title>
    <style>
        :root { --navy-blue: #2C1E85; --brand-red: #DA251D; --red-hover: #B81D15; --background: #F8F9FA; --border: #E2E8F0; --text-gray: #475467; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--background); color: var(--navy-blue); min-height: 100vh; display: flex; flex-direction: column; }
        header { background-color: var(--navy-blue); padding: 1rem 5%; color: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--brand-red); }
        .logo { font-weight: bold; text-transform: uppercase; }
        .logo span { color: var(--brand-red); }
        .main-container { max-width: 1200px; margin: 3rem auto; padding: 0 1.5rem; flex: 1; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 2rem; border-top: 4px solid var(--navy-blue); }
        h2 { margin-bottom: 1.5rem; color: var(--navy-blue); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: white; padding: 2rem; border-radius: 8px; border-bottom: 4px solid #EAECF0; text-align: center; }
        .stat-card .stat-number { font-size: 3rem; font-weight: 800; color: var(--brand-red); margin: 0.5rem 0; }
        .stat-card .stat-label { color: var(--text-gray); font-size: 0.9rem; text-transform: uppercase; font-weight: 500; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid var(--border); }
        th { background-color: #E0E7FF; color: var(--navy-blue); }
        .btn-approve { background-color: var(--brand-red); color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-approve:hover { background-color: var(--red-hover); }
        .logout-link { background: transparent; color: white; border: 1px solid white; padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.9rem; font-weight: bold; transition: 0.3s; }
        .logout-link:hover { background-color: rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <header>
        <div class="logo">ENET SUPREME <span>ADMIN</span> HUB</div>
        <button id="logoutBtn" class="logout-link">Log Out</button>
    </header>

    <main class="main-container">
        <section class="card" style="border-left: 5px solid #F59E0B; border-top: none;">
            <h2>Action Required: Pending Account Approvals</h2>
            <table>
                <thead><tr><th>Name</th><th>Email</th><th>Requested Role</th><th>Signup Date</th><th>Action</th></tr></thead>
                <tbody id="pending-users-list">
                    <tr><td colspan="5" style="text-align: center; color: var(--text-gray);">Loading...</td></tr>
                </tbody>
            </table>
        </section>

        <h2>Academy Overview Statistics</h2>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Total Active Students</div><div class="stat-number" id="stat-students">0</div></div>
            <div class="stat-card"><div class="stat-label">Total Academy Tracks</div><div class="stat-number" id="stat-tracks">6</div></div>
            <div class="stat-card"><div class="stat-label">Instructor / Teacher Count</div><div class="stat-number" id="stat-teachers">0</div></div>
        </div>

        <section class="card">
            <h2>User Management & Roles</h2>
            <table>
                <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Management</th></tr></thead>
                <tbody id="all-users-list">
                    <tr><td colspan="5" style="text-align: center; color: var(--text-gray);">Loading...</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <!-- STEP 1: Supabase CDN loads first -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- STEP 2: All logic wrapped in window.onload — guarantees both DOM + Supabase are ready -->
    <script>
        window.addEventListener('load', function () {

            // 1. Database Connection
            const supabaseUrl = 'https://lskwzcvexyxjncttvimf.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxza3d6Y3ZleHl4am5jdHR2aW1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTIzNjEsImV4cCI6MjA4ODU4ODM2MX0.W8sEQ2ZtmBe-oqsznCX_UinJ2Jz2NNe0LuQct33VP2E';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

            // 2. The Core Function
            async function loadAdminDashboard() {
                const pendingList = document.getElementById('pending-users-list');
                const allList = document.getElementById('all-users-list');

                try {
                    const { data, error } = await supabase.from('profiles').select('*').order('created_at', { ascending: false });

                    if (error) {
                        pendingList.innerHTML = `<tr><td colspan="5" style="color: red; text-align: center; font-weight: bold;">Supabase Error: ${error.message}<br>(Check that Row Level Security allows anon reads, or disable RLS in Supabase SQL editor)</td></tr>`;
                        allList.innerHTML = `<tr><td colspan="5" style="color: red; text-align: center;">Failed to load.</td></tr>`;
                        return;
                    }

                    if (!data || data.length === 0) {
                        pendingList.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #10B981; font-weight:bold;">No user accounts found in the system.</td></tr>`;
                        allList.innerHTML = `<tr><td colspan="5" style="text-align: center;">No users registered yet.</td></tr>`;
                        return;
                    }

                    let pendingHTML = '';
                    let allHTML = '';
                    let studentCount = 0;
                    let teacherCount = 0;

                    data.forEach(user => {
                        const name = `${user.first_name || 'User'} ${user.last_name || ''}`;
                        const email = user.email || 'N/A';
                        const role = user.role || 'student';
                        const date = user.created_at ? new Date(user.created_at).toLocaleDateString() : 'Unknown';

                        if (user.status === 'pending') {
                            pendingHTML += `<tr>
                                <td style="font-weight: bold;">${name}</td>
                                <td>${email}</td>
                                <td style="text-transform: capitalize;">${role}</td>
                                <td>${date}</td>
                                <td><button class="btn-approve" onclick="approveUser('${user.id}')">Approve Access</button></td>
                            </tr>`;
                        } else if (user.status === 'approved') {
                            if (role === 'student') studentCount++;
                            if (role === 'teacher') teacherCount++;

                            let adminBtn = role !== 'admin'
                                ? `<button onclick="makeAdmin('${user.id}')" style="background-color: var(--navy-blue); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer;">Make Admin</button>`
                                : `<span style="color: var(--brand-red); font-weight: bold;">Master Admin</span>`;

                            allHTML += `<tr>
                                <td style="font-weight: bold;">${name}</td>
                                <td>${email}</td>
                                <td style="text-transform: capitalize;">${role}</td>
                                <td style="color: #10B981; font-weight: bold;">Approved</td>
                                <td>${adminBtn}</td>
                            </tr>`;
                        }
                    });

                    pendingList.innerHTML = pendingHTML || `<tr><td colspan="5" style="text-align: center; font-weight:bold; color: #10B981;">No pending approvals! All caught up.</td></tr>`;
                    allList.innerHTML = allHTML || `<tr><td colspan="5" style="text-align: center; color: #666;">No approved users yet.</td></tr>`;

                    document.getElementById('stat-students').innerText = studentCount;
                    document.getElementById('stat-teachers').innerText = teacherCount;

                } catch (err) {
                    document.getElementById('pending-users-list').innerHTML = `<tr><td colspan="5" style="color: red; text-align: center; font-weight: bold;">Code Crash: ${err.message}</td></tr>`;
                }
            }

            // 3. Approval Logic
            window.approveUser = async function(userId) {
                const { error } = await supabase.from('profiles').update({ status: 'approved' }).eq('id', userId);
                if (error) alert("Approval Failed: " + error.message);
                else loadAdminDashboard();
            }

            window.makeAdmin = async function(userId) {
                if (confirm("Are you sure you want to make this user an Admin?")) {
                    const { error } = await supabase.from('profiles').update({ role: 'admin' }).eq('id', userId);
                    if (error) alert("Upgrade Failed: " + error.message);
                    else loadAdminDashboard();
                }
            }

            // 4. Logout — wired here so the button element is guaranteed to exist
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                document.getElementById('logoutBtn').innerText = "Logging out...";
                try { await supabase.auth.signOut(); } catch (err) {}
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = 'index.html';
            });

            // 5. Run dashboard load
            loadAdminDashboard();
        });
    </script>
</body>
</html>
