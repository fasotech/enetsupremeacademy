<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENET SUPREME ACADEMY | Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script>
        const _st = localStorage.getItem('enet_theme') || 'system';
        document.documentElement.setAttribute('data-theme',
            _st === 'dark' || (_st === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
    </script>
    <style>
        :root {
            --brand-navy: #02014a; --navy-light: #0d2a8f; --brand-yellow: #fcd116;
            --yellow-hover: #e0b800; --accent-cyan: #00a0df;
            --danger: #EE5D50; --success: #05CD99;
            --bg-light: #F4F7FE; --surface: #FFFFFF; --surface-hover: rgba(0,160,223,0.05);
            --border: #E9EDF7; --border-bright: #D1D9EB;
            --text-dark: #02014a; --text-muted: #8A98C9; --text-gray: #475467;
            --topbar-bg: rgba(244,247,254,0.92); --shadow-color: rgba(2,1,74,0.06);
        }
        [data-theme="dark"] {
            --bg-light: #07080F; --surface: #13151F; --surface-hover: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.08); --border-bright: rgba(255,255,255,0.15);
            --text-dark: #F0F0FF; --text-muted: #7B7D9A; --text-gray: #A0AEC0;
            --topbar-bg: rgba(7,8,15,0.92); --shadow-color: rgba(0,0,0,0.4);
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg-light);color:var(--text-gray);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;overflow-x:hidden;transition:background .3s,color .3s}

        /* SIDEBAR */
        .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(2,1,74,0.4);backdrop-filter:blur(4px);z-index:90;opacity:0;transition:opacity .3s}
        .sidebar-overlay.show{display:block;opacity:1}
        .sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--surface);display:flex;flex-direction:column;z-index:100;box-shadow:4px 0 24px var(--shadow-color);border-right:1px solid var(--border);transition:transform .3s,background .3s}
        .sidebar-logo{padding:2.5rem 2rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
        .brand{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.25rem;letter-spacing:-.02em;text-transform:uppercase;color:var(--text-dark);line-height:1.2}
        .brand span{color:var(--brand-yellow)}
        .badge-admin{display:inline-block;margin-top:.4rem;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
        .close-sidebar{display:none;background:none;border:none;font-size:1.5rem;color:var(--text-muted);cursor:pointer}
        .nav-label{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);padding:1.5rem 2rem .5rem}
        .nav-item{display:flex;align-items:center;gap:.85rem;padding:.85rem 2rem;margin:.2rem 1rem;font-size:.95rem;font-weight:500;color:var(--text-gray);border-radius:12px;cursor:pointer;text-decoration:none;transition:all .2s;border-left:3px solid transparent}
        .nav-item:hover{color:var(--accent-cyan);background:var(--surface-hover)}
        .nav-item.active{color:var(--brand-navy);font-weight:700;background:var(--surface-hover);border-left-color:var(--accent-cyan)}
        .nav-item svg{flex-shrink:0;width:20px;height:20px;opacity:.8}
        .nav-item.active svg{opacity:1;color:var(--accent-cyan)}
        .nav-badge{margin-left:auto;font-size:.7rem;font-weight:700;background:var(--brand-yellow);color:var(--brand-navy);border-radius:20px;padding:2px 8px;min-width:22px;text-align:center}
        .sidebar-foot{margin-top:auto;padding:1.5rem 1.5rem 2rem}
        .logout-btn{display:flex;align-items:center;gap:.75rem;width:100%;background:var(--bg-light);color:var(--text-gray);border:1px solid var(--border);padding:.85rem 1.25rem;border-radius:12px;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s}
        .logout-btn:hover{background:rgba(238,93,80,0.1);color:var(--danger);border-color:rgba(238,93,80,0.2)}

        /* MAIN */
        .main-wrap{margin-left:260px;flex:1;display:flex;flex-direction:column;position:relative;z-index:1;transition:margin-left .3s}
        .topbar{position:sticky;top:0;z-index:50;background:var(--topbar-bg);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:space-between;padding:1.5rem 2.5rem;border-bottom:1px solid var(--border)}
        .topbar-left{display:flex;align-items:center;gap:1rem}
        .mobile-toggle{display:none;background:var(--surface);border:1px solid var(--border);border-radius:8px;width:40px;height:40px;align-items:center;justify-content:center;cursor:pointer;color:var(--accent-cyan);box-shadow:0 2px 10px var(--shadow-color)}
        .welcome-text h1{font-family:'Poppins',sans-serif;font-size:1.75rem;font-weight:700;color:var(--text-dark);letter-spacing:-.02em;margin-bottom:.2rem}
        .welcome-text p{font-size:.9rem;color:var(--text-gray)}
        .topbar-right{display:flex;align-items:center;gap:1rem}
        .search-wrap{display:flex;align-items:center;gap:.5rem;background:var(--surface);border-radius:50px;padding:.6rem 1.2rem;box-shadow:0 4px 15px var(--shadow-color);border:1px solid var(--border);width:250px;transition:width .3s,border-color .2s}
        .search-wrap:focus-within{width:310px;border-color:var(--accent-cyan)}
        .search-wrap input{background:none;border:none;outline:none;color:var(--text-dark);font-family:'DM Sans',sans-serif;font-size:.85rem;width:100%}
        .search-wrap input::placeholder{color:var(--text-muted)}
        .icon-btn{position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;background:var(--surface);border:1px solid var(--border);transition:.2s;color:var(--text-muted);box-shadow:0 4px 15px var(--shadow-color);font-size:1.1rem}
        .icon-btn:hover{background:var(--bg-light);color:var(--accent-cyan);transform:translateY(-2px)}
        .notification-wrapper{position:relative}
        .bell-badge{position:absolute;top:-2px;right:-2px;background:var(--danger);color:#fff;font-size:.6rem;font-weight:700;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:2px solid var(--surface)}
        .notification-dropdown{position:absolute;top:120%;right:0;width:340px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:0 10px 40px var(--shadow-color);display:none;flex-direction:column;z-index:1000;animation:scaleIn .18s ease}
        .notification-dropdown.show{display:flex}
        .notif-header{padding:1.2rem 1.25rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .notif-header h4{font-family:'Poppins',sans-serif;font-size:.95rem;color:var(--text-dark)}
        .notif-header span{font-size:.7rem;background:rgba(0,160,223,0.1);color:var(--accent-cyan);padding:3px 8px;border-radius:12px;font-weight:700}
        .notif-body{max-height:400px;overflow-y:auto}
        .notif-item{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:background .2s}
        .notif-item:hover{background:var(--surface-hover)}
        .notif-icon{width:36px;height:36px;border-radius:50%;background:var(--bg-light);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.1rem}
        .notif-content p{font-size:.8rem;color:var(--text-dark);margin-bottom:4px;line-height:1.4}
        .notif-content p strong{color:var(--brand-navy); font-weight: 700;}
        .notif-empty{padding:2rem;text-align:center;color:var(--text-muted);font-size:.85rem}
        .live-dot{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:700;color:var(--success);background:rgba(5,205,153,.1);border:1px solid rgba(5,205,153,.2);padding:4px 10px;border-radius:20px;white-space:nowrap}
        .live-dot::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--success);animation:livePulse 1.5s ease-in-out infinite}
        .header-logout-btn { display: flex; align-items: center; gap: 6px; background: rgba(238,93,80,0.1); color: var(--danger); border: 1px solid rgba(238,93,80,0.2); padding: 8px 16px; border-radius: 8px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.2s; font-family: 'DM Sans', sans-serif;}
        .header-logout-btn:hover { background: var(--danger); color: #fff; box-shadow: 0 4px 10px rgba(238,93,80,0.3); transform: translateY(-2px);}

        /* CONTENT */
        .content{padding:0 2.5rem 2.5rem;flex:1}
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;margin-bottom:2rem}
        .stat-card{border-radius:20px;padding:1.75rem;position:relative;overflow:hidden;box-shadow:0 10px 30px var(--shadow-color);animation:fadeUp .4s ease both;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease}
        .stat-card:hover{transform:translateY(-5px);box-shadow:0 15px 40px var(--shadow-color)}
        .stat-card.ring{outline:3px solid var(--accent-cyan);outline-offset:-3px;transform:translateY(-6px)}
        .stat-card.brand-blue{background:var(--brand-navy);color:#fff}
        .stat-card.brand-orange{background:var(--accent-cyan);color:#fff}
        .stat-card.brand-yellow{background:var(--brand-yellow);color:var(--brand-navy)}
        .stat-card.brand-surface{background:var(--surface);color:var(--brand-navy);border:1px solid var(--border);border-top:4px solid var(--danger)}
        .stat-lbl{font-size:.85rem;font-weight:500;opacity:.9;margin-bottom:.5rem}
        .stat-card.brand-surface .stat-lbl{color:var(--text-gray)}
        .stat-num{font-family:'Poppins',sans-serif;font-size:2.25rem;font-weight:700;line-height:1;margin-bottom:.25rem}
        .stat-hint{font-size:.72rem;opacity:.7;margin-top:.35rem}
        .stat-arrow{position:absolute;bottom:1.25rem;right:1.5rem;font-size:1.4rem;opacity:.18;transition:opacity .2s,transform .2s}
        .stat-card:hover .stat-arrow,.stat-card.ring .stat-arrow{opacity:.4;transform:scale(1.15) rotate(-10deg)}

        /* PANELS */
        .dashboard-grid{display:grid;grid-template-columns:2fr 1fr;gap:1.5rem}
        .panel{background:var(--surface);border-radius:24px;margin-bottom:2rem;overflow:hidden;box-shadow:0 10px 40px var(--shadow-color);animation:fadeUp .4s ease both;transition:background .3s}
        .panel-head{display:flex;align-items:center;justify-content:space-between;padding:1.75rem 2rem 1rem;flex-wrap:wrap;gap:.75rem}
        .panel-title{font-family:'Poppins',sans-serif;font-size:1.2rem;font-weight:700;color:var(--text-dark)}
        .panel-cnt{font-size:.75rem;font-weight:700;background:var(--bg-light);color:var(--accent-cyan);padding:4px 10px;border-radius:20px;margin-left:10px;vertical-align:middle;border:1px solid var(--border)}

        /* TABS */
        .tab-bar{display:flex;gap:.5rem;padding:0 2rem 1.5rem;overflow-x:auto;white-space:nowrap}
        .tab-bar::-webkit-scrollbar{display:none}
        .tab-btn{font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;padding:.5rem 1.25rem;border-radius:50px;border:1px solid var(--border);cursor:pointer;color:var(--text-gray);background:var(--surface);transition:all .2s}
        .tab-btn:hover{border-color:var(--accent-cyan);color:var(--text-dark)}
        .tab-btn.active{color:var(--brand-navy);background:var(--brand-yellow);border-color:var(--brand-yellow)}

        /* TABLES */
        .table-responsive{width:100%;overflow-x:auto}
        .data-tbl{width:100%;border-collapse:collapse;text-align:left;min-width:800px}
        .data-tbl th{padding:1rem 2rem;font-size:.75rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border);background:var(--bg-light)}
        .data-tbl td{padding:1.25rem 2rem;font-size:.9rem;color:var(--text-gray);border-bottom:1px solid var(--border);vertical-align:middle}
        .data-tbl tbody tr{transition:background .15s}
        .data-tbl tbody tr:hover{background:var(--bg-light)}
        .data-tbl tbody tr.clickable{cursor:pointer}
        .data-tbl tbody tr.clickable:hover .uname{color:var(--accent-cyan)}

        .user-cell{display:flex;align-items:center;gap:1rem}
        .uav{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-weight:700;font-size:1rem;color:#fff;flex-shrink:0;box-shadow:0 4px 10px rgba(0,0,0,.1)}
        .uname{font-size:.95rem;font-weight:700;color:var(--text-dark);transition:color .2s}
        .uid{font-size:.7rem;color:var(--text-muted);margin-top:2px}

        /* BADGES & BTNS */
        .role-badge{display:inline-flex;align-items:center;font-size:.7rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 10px;border-radius:6px}
        .role-badge.student{background:rgba(0,160,223,0.1);color:var(--accent-cyan)}
        .role-badge.teacher,.role-badge.instructor{background:rgba(252,209,22,0.2);color:var(--brand-navy)}
        .role-badge.admin{background:rgba(5,205,153,.1);color:var(--success)}
        .status-badge{display:inline-flex;align-items:center;gap:6px;font-size:.75rem;font-weight:600}
        .status-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
        .status-badge.active{color:var(--success)}
        .status-badge.pending{color:var(--brand-yellow)}
        .status-badge.inactive{color:var(--text-muted)}

        .actions{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
        .btn{display:inline-flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;padding:6px 12px;border-radius:8px;border:1px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap}
        .btn-approve{background:rgba(5,205,153,.1);color:var(--success);border-color:rgba(5,205,153,.2)}
        .btn-approve:hover{background:var(--success);color:#fff}
        .btn-danger{background:rgba(238,93,80,.1);color:var(--danger);border-color:rgba(238,93,80,.2)}
        .btn-danger:hover{background:var(--danger);color:#fff}
        .btn-admin{background:rgba(0,160,223,0.1);color:var(--accent-cyan);border-color:rgba(0,160,223,0.2)}
        .btn-admin:hover{background:var(--accent-cyan);color:#fff}
        .btn-unadmin{background:rgba(252,209,22,0.2);color:var(--brand-navy);border-color:rgba(252,209,22,0.3)}
        .btn-unadmin:hover{background:var(--brand-yellow);color:var(--brand-navy)}
        .btn-deact{background:var(--bg-light);color:var(--text-gray);border-color:var(--border)}
        .btn-deact:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
        .btn-activate{background:rgba(5,205,153,.1);color:var(--success);border-color:rgba(5,205,153,.2)}
        .btn-activate:hover{background:var(--success);color:#fff}
        
        .btn-ghost-mode {background: var(--brand-navy); color: #fff; grid-column: span 2; margin-top: 0.5rem; justify-content: center; padding: 0.85rem;}
        .btn-ghost-mode:hover {background: var(--navy-light); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(2,1,74,0.2);}

        .btn-primary{background:var(--accent-cyan);color:#fff;border-color:var(--accent-cyan);font-size:.95rem;padding:.75rem 2rem}
        .btn-primary:hover{background:#0088bd}

        /* NEW: Grant Course select styling */
        .grant-course-wrap { background: rgba(0, 160, 223, 0.05); border: 1px solid rgba(0, 160, 223, 0.2); padding: 1rem; border-radius: 12px; grid-column: span 2; margin-top: 1rem; }
        .grant-course-wrap select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; background: var(--surface); color: var(--text-dark); outline: none; }
        .grant-course-wrap select:focus { border-color: var(--accent-cyan); }
        .grant-course-wrap button { width: 100%; justify-content: center; background: var(--accent-cyan); color: #fff; }

        .system-owner-tag{display:inline-flex;align-items:center;gap:6px;font-size:.75rem;font-weight:700;color:var(--brand-navy);background:var(--brand-yellow);border:1px solid rgba(252,209,22,0.5);padding:6px 12px;border-radius:8px}

        /* DRAWER */
        .drawer-backdrop{position:fixed;inset:0;background:rgba(2,1,74,0.5);backdrop-filter:blur(5px);z-index:200;opacity:0;pointer-events:none;transition:opacity .28s}
        .drawer-backdrop.open{opacity:1;pointer-events:all}
        .drawer{position:fixed;right:0;top:0;bottom:0;width:440px;max-width:96vw;background:var(--surface);z-index:201;box-shadow:-10px 0 50px var(--shadow-color);border-left:1px solid var(--border);transform:translateX(105%);transition:transform .32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
        .drawer.open{transform:translateX(0)}
        .drawer-header{padding:1.75rem 2rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg-light)}
        .drawer-header-left{display:flex;align-items:center;gap:.75rem}
        .drawer-header h3{font-family:'Poppins',sans-serif;font-size:1.1rem;font-weight:700;color:var(--text-dark)}
        .drawer-close{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:1.1rem;transition:all .2s}
        .drawer-close:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
        .drawer-body{flex:1;overflow-y:auto;padding:1.75rem}
        .d-avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:.75rem;margin-bottom:1.75rem;padding-bottom:1.75rem;border-bottom:1px solid var(--border)}
        .d-avatar{width:88px;height:88px;border-radius:22px;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-weight:800;font-size:2.2rem;color:#fff;box-shadow:0 10px 28px rgba(0,0,0,.15)}
        .d-name{font-family:'Poppins',sans-serif;font-size:1.35rem;font-weight:700;color:var(--text-dark);text-align:center}
        .d-email{font-size:.85rem;color:var(--text-muted);text-align:center;margin-top:.2rem}
        .d-badges{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-top:.6rem}
        .detail-section{margin-bottom:1.5rem}
        .detail-section-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.85rem}
        .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
        .detail-item{background:var(--bg-light);border-radius:14px;padding:1rem 1.25rem;border:1px solid var(--border)}
        .detail-item.full{grid-column:span 2}
        .detail-lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:.4rem}
        .detail-val{font-size:.92rem;font-weight:600;color:var(--text-dark);word-break:break-all}
        .drawer-action-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
        .drawer-action-grid .btn{justify-content:center;padding:.75rem 1rem;font-size:.85rem}
        .drawer-action-grid .btn.full{grid-column:span 2}

        .toast-wrap{position:fixed;bottom:2rem;right:2rem;z-index:9999;display:flex;flex-direction:column;gap:.75rem;pointer-events:none}
        .toast{display:flex;align-items:center;gap:.75rem;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1rem 1.5rem;box-shadow:0 10px 40px var(--shadow-color);font-size:.9rem;font-weight:600;color:var(--text-dark);pointer-events:all;animation:toastIn .3s ease;max-width:360px}
        .toast.success{border-left:4px solid var(--success)}
        .toast.error{border-left:4px solid var(--danger)}
        .toast.info{border-left:4px solid var(--accent-cyan)}
        @keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(12px)}}

        @media(max-width:992px){
            .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
            .main-wrap{margin-left:0}.mobile-toggle{display:flex}
            .stats-grid{grid-template-columns:repeat(2,1fr)}
            .topbar{padding:1rem 1.5rem}.content{padding:0 1.5rem 1.5rem}
        }
        @media(max-width:576px){
            .stats-grid{grid-template-columns:1fr}
            .drawer{width:100vw}.detail-grid{grid-template-columns:1fr}
            .drawer-action-grid{grid-template-columns:1fr}
        }
    </style>
</head>
<body>

<div class="toast-wrap" id="toast-wrap"></div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <div>
            <div class="brand">ENET <span>SUPREME</span></div>
            <div class="badge-admin">Admin Dashboard</div>
        </div>
        <button class="close-sidebar" onclick="toggleSidebar()">✕</button>
    </div>
    <div class="nav-label">Main Menu</div>
    <a class="nav-item active" href="admin-dashboard.html">

    </a>

        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>Students

        </button>

</aside>

<div class="main-wrap">
    <header class="topbar">
        <div class="topbar-left">
            <button class="mobile-toggle" onclick="toggleSidebar()">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <div class="welcome-text">
                <h1>Welcome back, Admin!</h1>
            </div>
        </div>
        <div class="topbar-right">
            <button class="icon-btn" onclick="cycleTheme()" title="Toggle theme"><span id="theme-icon">💻</span></button>
            <button class="header-logout-btn" id="logoutBtnTop" title="Log out">Log Out</button>
        </div>
    </header>

    <main class="content">
        <div class="dashboard-grid" style="grid-template-columns: 1fr;">
            <div class="panel users">
                <div class="panel-head">
                    <div class="panel-title">User Management <span class="panel-cnt" id="users-badge">0</span></div>
                </div>
                <div class="tab-bar">
                    <button class="tab-btn active" onclick="switchTab('all')"      id="tab-all">All Users</button>
                    <button class="tab-btn"         onclick="switchTab('students')" id="tab-students">Students</button>
                    <button class="tab-btn"         onclick="switchTab('teachers')" id="tab-teachers">Teachers</button>
                </div>
                <div class="table-responsive">
                    <table class="data-tbl">
                        <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
                        <tbody id="all-users-list">
                            <tr><td colspan="6" style="text-align: center;">Loading users...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<div class="drawer-backdrop" id="drawerBg" onclick="closeDrawer()"></div>
<div class="drawer" id="userDrawer">
    <div class="drawer-header">
        <div class="drawer-header-left">
            <span id="drawer-role-icon" style="font-size:1.3rem">👤</span>
            <h3 id="drawer-title">User Details</h3>
        </div>
        <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const _themes=['system','light','dark'];
const _tIcons={system:'💻',light:'☀️',dark:'🌙'};
function cycleTheme(){const cur=localStorage.getItem('enet_theme')||'system';const next=_themes[(_themes.indexOf(cur)+1)%_themes.length];localStorage.setItem('enet_theme',next);applyTheme(next);}
function applyTheme(t){const el=document.getElementById('theme-icon');if(el)el.textContent=_tIcons[t];document.documentElement.setAttribute('data-theme',t==='system'&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':t);}

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('show');}

function showToast(msg,type='info'){
    const wrap=document.getElementById('toast-wrap');
    const t=document.createElement('div');
    t.className=`toast ${type}`;
    t.innerHTML=`<span>${type==='error'?'❌':'✅'}</span><span>${msg}</span>`;
    wrap.appendChild(t);
    setTimeout(()=>{t.style.animation='toastOut .3s ease forwards';setTimeout(()=>t.remove(),320);},3500);
}

const GRADS=['linear-gradient(135deg,#02014a,#0d2a8f)','linear-gradient(135deg,#fcd116,#e0b800)','linear-gradient(135deg,#00a0df,#0088bd)'];
function grad(s){let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return GRADS[Math.abs(h)%GRADS.length];}
function inits(f,l){return((f||'U')[0]+(l||'?')[0]).toUpperCase();}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function getRole(u){return(u.role||'').trim().toLowerCase()||'student';}

let _data=[],_tab='all',_sb, _allCourses=[];

// ── ADMIN GRANT COURSE LOGIC ──
window.impersonateUser = function(userId, role) {
    if(confirm("Enter Ghost Mode?")) {
        localStorage.setItem('enet_impersonate_id', userId);
        window.open((role === 'teacher' || role === 'instructor') ? 'teacher-dashboard.html' : 'student-dashboard.html', '_blank');
    }
}

window.grantCourseAccess = async function(userId) {
    const courseId = document.getElementById('grant-course-select').value;
    if(!courseId) return showToast("Please select a course first.", "error");

    try {
        // Check if already enrolled
        const {data: existing} = await _sb.from('enrollments').select('id').eq('student_id', userId).eq('course_id', courseId).maybeSingle();
        if(existing) return showToast("Student is already enrolled in this course.", "info");

        // Grant access
        const {error} = await _sb.from('enrollments').insert({ student_id: userId, course_id: courseId, enrollment_type: 'admin_granted' });
        if(error) throw error;
        
        showToast("Course successfully granted to student!", "success");
        closeDrawer();
    } catch (err) {
        showToast("Failed to grant course: " + err.message, "error");
    }
}

function openDrawer(userId){
    const u=_data.find(x=>x.id===userId);
    if(!u)return;
    const r=getRole(u);
    const isInactive=u.status==='inactive';
    const isPending=u.status==='pending';
    const nm=`${u.first_name||'User'} ${u.last_name||''}`.trim();
    let displayRole=r;
    if(r.includes('teacher')||r.includes('instructor'))displayRole='teacher';
    else if(r==='admin')displayRole='admin';
    else displayRole='student';
    
    document.getElementById('drawer-role-icon').textContent = displayRole==='teacher'?'🎓':displayRole==='admin'?'🛡️':'🎒';
    document.getElementById('drawer-title').textContent=displayRole==='teacher'?'Teacher Profile':displayRole==='admin'?'Admin Profile':'Student Profile';
    
    let actions='';
    if(isPending){
        actions=`<button class="btn btn-approve full" onclick="approveUser('${u.id}');closeDrawer()">✓ Approve Registration</button>`;
    } else {
        actions=`${isInactive?`<button class="btn btn-activate" onclick="toggleUserStatus('${u.id}','approved');closeDrawer()">▶ Activate</button>`:`<button class="btn btn-deact" onclick="toggleUserStatus('${u.id}','inactive');closeDrawer()">⏸ Suspend</button>`}`;
        actions += `<button class="btn btn-ghost-mode" onclick="impersonateUser('${u.id}', '${displayRole}')">🔑 Login as User</button>`;
        
        // ADDED: The Grant Course dropdown for Students
        if (displayRole === 'student') {
            let options = '<option value="">-- Select Course --</option>';
            _allCourses.forEach(c => { options += `<option value="${c.id}">${c.title}</option>`; });
            
            actions += `
            <div class="grant-course-wrap">
                <div class="detail-section-title" style="margin-bottom:5px;">📚 Grant Course Access</div>
                <select id="grant-course-select">${options}</select>
                <button class="btn btn-primary" onclick="grantCourseAccess('${u.id}')">Enroll Student</button>
            </div>`;
        }
    }
    
    const avatarStyle=u.avatar_url?`background-image:url('${u.avatar_url}');background-size:cover;background-position:center;`:`background:${grad(u.id||nm)};`;
    const avatarText=u.avatar_url?'':inits(u.first_name,u.last_name);
    
    document.getElementById('drawer-body').innerHTML=`<div class="d-avatar-wrap"><div class="d-avatar" style="${avatarStyle}${isInactive?'filter:grayscale(.7)':''}">${avatarText}</div><div><div class="d-name">${nm}</div><div class="d-email">${u.email||'No email'}</div></div><div class="d-badges"><span class="role-badge ${displayRole}">${r}</span><span class="status-badge ${isInactive?'inactive':isPending?'pending':'active'}">${isInactive?'Suspended':isPending?'Pending':'Active'}</span></div></div><div class="detail-section"><div class="detail-section-title">Account Details</div><div class="detail-grid"><div class="detail-item"><div class="detail-lbl">First Name</div><div class="detail-val">${u.first_name||'—'}</div></div><div class="detail-item"><div class="detail-lbl">Last Name</div><div class="detail-val">${u.last_name||'—'}</div></div><div class="detail-item full"><div class="detail-lbl">Phone Number</div><div class="detail-val">${u.phone||'Not provided'}</div></div></div></div><div class="detail-section"><div class="detail-section-title">Quick Actions</div><div class="drawer-action-grid">${actions}</div></div>`;
    
    document.getElementById('drawerBg').classList.add('open');
    document.getElementById('userDrawer').classList.add('open');
}
function closeDrawer(){document.getElementById('drawerBg').classList.remove('open');document.getElementById('userDrawer').classList.remove('open');}

window.quickNav=function(tab){closeSidebar();switchTab(tab);};

function renderUsers(data,tab){
    let rows=data.filter(u=>u.status==='approved'||u.status==='inactive' || u.status==='pending');
    if(tab==='students')rows=rows.filter(u=>{const r=getRole(u);return r==='student'||r==='';});
    else if(tab==='teachers')rows=rows.filter(u=>{const r=getRole(u);return r.includes('teacher')||r.includes('instructor');});
    
    document.getElementById('users-badge').textContent=rows.length;
    if(!rows.length){ document.getElementById('all-users-list').innerHTML=`<tr><td colspan="6" style="text-align:center;">No users found.</td></tr>`; return;}
    
    document.getElementById('all-users-list').innerHTML=rows.map(u=>{
        const nm=`${u.first_name||'User'} ${u.last_name||''}`.trim();
        const r=getRole(u);const isInactive=u.status==='inactive'; const isPending=u.status==='pending';
        let bc='student';if(r.includes('teacher')||r.includes('instructor'))bc='teacher';if(r==='admin')bc='admin';
        let btns='';
        if(isPending) btns=`<button class="btn btn-approve" onclick="event.stopPropagation();approveUser('${u.id}')">✓ Approve</button>`;
        else btns+=isInactive?`<button class="btn btn-activate" onclick="event.stopPropagation();toggleUserStatus('${u.id}','approved')">▶ Activate</button>`:`<button class="btn btn-deact" onclick="event.stopPropagation();toggleUserStatus('${u.id}','inactive')">⏸ Suspend</button>`;
        
        return`<tr class="clickable" onclick="openDrawer('${u.id}')"><td><div class="user-cell"><div class="uav" style="background:${grad(u.id||nm)};">${inits(u.first_name,u.last_name)}</div><div><div class="uname">${nm}</div><div class="uid">#${(u.id||'').slice(0,8)}</div></div></div></td><td>${u.email||'N/A'}</td><td><span class="role-badge ${bc}">${r}</span></td><td><span class="status-badge ${isInactive?'inactive':isPending?'pending':'active'}">${isInactive?'Suspended':isPending?'Pending':'Active'}</span></td><td>${fmtDate(u.created_at)}</td><td onclick="event.stopPropagation()"><div class="actions">${btns}</div></td></tr>`;
    }).join('');
}

window.switchTab=function(tab){_tab=tab;['all','students','teachers'].forEach(t=>{const el=document.getElementById('tab-'+t);if(el)el.classList.toggle('active',t===tab);});renderUsers(_data,tab);};

async function mutate(userId,updates){
    const idx=_data.findIndex(u=>u.id===userId);if(idx!==-1)Object.assign(_data[idx],updates);renderUsers(_data,_tab);
    await _sb.from('profiles').update(updates).eq('id',userId);
}

window.approveUser=async function(userId){await mutate(userId,{status:'approved'});showToast('User approved!','success');};
window.toggleUserStatus=async function(userId,newStatus){await mutate(userId,{status:newStatus});showToast(newStatus==='inactive'?'Suspended.':'Activated.','info');};

async function loadData(){
    const {data: profiles} = await _sb.from('profiles').select('id,first_name,last_name,email,role,status,created_at,phone,avatar_url').order('created_at',{ascending:false});
    _data=profiles||[];
    renderUsers(_data,_tab);

    const {data: courses} = await _sb.from('courses').select('id,title').eq('is_published', true);
    _allCourses = courses || [];
}

window.addEventListener('load',function(){
    applyTheme(localStorage.getItem('enet_theme')||'system');
    _sb=window.supabase.createClient('https://lskwzcvexyxjncttvimf.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxza3d6Y3ZleHl4am5jdHR2aW1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTIzNjEsImV4cCI6MjA4ODU4ODM2MX0.W8sEQ2ZtmBe-oqsznCX_UinJ2Jz2NNe0LuQct33VP2E');
    loadData();
    document.getElementById('logoutBtn').addEventListener('click',async()=>{ await _sb.auth.signOut(); localStorage.clear(); window.location.href='index.html'; });
    document.getElementById('logoutBtnTop').addEventListener('click',async()=>{ await _sb.auth.signOut(); localStorage.clear(); window.location.href='index.html'; });
});
</script>
</body>
</html>
