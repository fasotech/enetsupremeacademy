<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENET SUPREME ACADEMY | Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <!-- Chart.js for Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const _st = localStorage.getItem('enet_theme') || 'system';
        document.documentElement.setAttribute('data-theme', _st === 'dark' || (_st === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
    </script>
    <style>
        :root {
            --brand-navy: #02014a; --navy-light: #0d2a8f; --brand-yellow: #fcd116; --yellow-hover: #e0b800; --accent-cyan: #00a0df;
            --danger: #EE5D50; --success: #05CD99; --bg-light: #F4F7FE; --surface: #FFFFFF; --surface-hover: rgba(0,160,223,0.05);
            --border: #E9EDF7; --border-bright: #D1D9EB; --text-dark: #02014a; --text-muted: #8A98C9; --text-gray: #475467;
            --topbar-bg: rgba(244,247,254,0.92); --shadow-color: rgba(2,1,74,0.06);
        }
        [data-theme="dark"] {
            --bg-light: #07080F; --surface: #13151F; --surface-hover: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.08);
            --border-bright: rgba(255,255,255,0.15); --text-dark: #F0F0FF; --text-muted: #7B7D9A; --text-gray: #A0AEC0;
            --topbar-bg: rgba(7,8,15,0.92); --shadow-color: rgba(0,0,0,0.4);
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg-light);color:var(--text-gray);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;overflow-x:hidden;transition:background .3s,color .3s}

        /* SIDEBAR */
        .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(2,1,74,0.4);backdrop-filter:blur(4px);z-index:90;opacity:0;transition:opacity .3s}
        .sidebar-overlay.show{display:block;opacity:1}
        .sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--surface);display:flex;flex-direction:column;z-index:100;box-shadow:4px 0 24px var(--shadow-color);border-right:1px solid var(--border);transition:transform .3s,background .3s}
        .sidebar-logo { padding: 2.5rem 1.5rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .logo-wrapper { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .main-logo-img { height: 36px; width: auto; object-fit: contain; flex-shrink: 0;}
        .brand-text-wrap { display: flex; flex-direction: column; }
        .brand { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 1.15rem; letter-spacing: -0.02em; text-transform: uppercase; color: var(--text-dark); line-height: 1.2; }
        .brand span { color: var(--brand-yellow); }
        .badge-admin { display: inline-block; margin-top: 0.2rem; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--success); }
        .close-sidebar{display:none;background:none;border:none;font-size:1.5rem;color:var(--text-muted);cursor:pointer}
        .nav-label{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);padding:1.5rem 2rem .5rem}
        .nav-item{display:flex;align-items:center;gap:.85rem;padding:.85rem 2rem;margin:.2rem 1rem;font-size:.95rem;font-weight:500;color:var(--text-gray);border-radius:12px;cursor:pointer;text-decoration:none;transition:all .2s;border-left:3px solid transparent}
        .nav-item:hover{color:var(--accent-cyan);background:var(--surface-hover)}
        .nav-item.active{color:var(--brand-navy);font-weight:700;background:var(--surface-hover);border-left-color:var(--accent-cyan)}
        .nav-item svg{flex-shrink:0;width:20px;height:20px;opacity:.8}
        .nav-item.active svg{opacity:1;color:var(--accent-cyan)}
        .nav-badge{margin-left:auto;font-size:.7rem;font-weight:700;background:var(--brand-yellow);color:var(--brand-navy);border-radius:20px;padding:2px 8px;min-width:22px;text-align:center}

        /* MAIN */
        .main-wrap{margin-left:260px;flex:1;display:flex;flex-direction:column;position:relative;z-index:1;transition:margin-left .3s}
        .topbar{position:sticky;top:0;z-index:50;background:var(--topbar-bg);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:space-between;padding:1.5rem 2.5rem;border-bottom:1px solid var(--border)}
        .topbar-left{display:flex;align-items:center;gap:1rem}
        .mobile-toggle{display:none;background:var(--surface);border:1px solid var(--border);border-radius:8px;width:40px;height:40px;align-items:center;justify-content:center;cursor:pointer;color:var(--accent-cyan);box-shadow:0 2px 10px var(--shadow-color)}
        .welcome-text h1{font-family:'Poppins',sans-serif;font-size:1.75rem;font-weight:700;color:var(--text-dark);letter-spacing:-.02em;margin-bottom:.2rem}
        .welcome-text p{font-size:.9rem;color:var(--text-gray)}
        .topbar-right{display:flex;align-items:center;gap:1rem}
        .search-wrap{display:flex;align-items:center;gap:.5rem;background:var(--surface);border-radius:50px;padding:.6rem 1.2rem;box-shadow:0 4px 15px var(--shadow-color);border:1px solid var(--border);width:250px;transition:width .3s,border-color .2s}
        .search-wrap:focus-within{width:310px;border-color:var(--accent-cyan)}
        .search-wrap input{background:none;border:none;outline:none;color:var(--text-dark);font-family:'DM Sans',sans-serif;font-size:.85rem;width:100%}
        .search-wrap input::placeholder{color:var(--text-muted)}
        .icon-btn{position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;background:var(--surface);border:1px solid var(--border);transition:.2s;color:var(--text-muted);box-shadow:0 4px 15px var(--shadow-color);font-size:1.1rem}
        .icon-btn:hover{background:var(--bg-light);color:var(--accent-cyan);transform:translateY(-2px)}
        
        .notification-wrapper{position:relative}
        .bell-badge{position:absolute;top:-2px;right:-2px;background:var(--danger);color:#fff;font-size:.6rem;font-weight:700;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:2px solid var(--surface)}
        .notification-dropdown{position:absolute;top:120%;right:0;width:340px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:0 10px 40px var(--shadow-color);display:none;flex-direction:column;z-index:1000;animation:scaleIn .18s ease}
        .notification-dropdown.show{display:flex}
        .notif-header{padding:1.2rem 1.25rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .notif-header h4{font-family:'Poppins',sans-serif;font-size:.95rem;color:var(--text-dark)}
        .notif-header span{font-size:.7rem;background:rgba(0,160,223,0.1);color:var(--accent-cyan);padding:3px 8px;border-radius:12px;font-weight:700}
        .notif-body{max-height:400px;overflow-y:auto}
        .notif-item{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:background .2s}
        .notif-item:hover{background:var(--surface-hover)}
        .notif-icon{width:36px;height:36px;border-radius:50%;background:var(--bg-light);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.1rem}
        .notif-content p{font-size:.8rem;color:var(--text-dark);margin-bottom:4px;line-height:1.4}
        .notif-content p strong{color:var(--brand-navy); font-weight: 700;}
        .notif-empty{padding:2rem;text-align:center;color:var(--text-muted);font-size:.85rem}
        .live-dot{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:700;color:var(--success);background:rgba(5,205,153,.1);border:1px solid rgba(5,205,153,.2);padding:4px 10px;border-radius:20px;white-space:nowrap}
        .live-dot::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--success);animation:livePulse 1.5s ease-in-out infinite}

        .header-logout-btn { display: flex; align-items: center; gap: 6px; background: rgba(238,93,80,0.1); color: var(--danger); border: 1px solid rgba(238,93,80,0.2); padding: 8px 16px; border-radius: 8px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.2s; font-family: 'DM Sans', sans-serif;}
        .header-logout-btn:hover { background: var(--danger); color: #fff; box-shadow: 0 4px 10px rgba(238,93,80,0.3); transform: translateY(-2px);}
        .logout-btn-mobile { display: none; color: var(--danger); border-color: rgba(238,93,80,0.2); background: rgba(238,93,80,0.1); }

        .content{padding:0 2.5rem 2.5rem;flex:1}

        /* STATS */
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;margin-bottom:2rem}
        .stat-card{border-radius:20px;padding:1.75rem;position:relative;overflow:hidden;box-shadow:0 10px 30px var(--shadow-color);animation:fadeUp .4s ease both;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease}
        .stat-card:hover{transform:translateY(-5px);box-shadow:0 15px 40px var(--shadow-color)}
        .stat-card.brand-blue{background:var(--brand-navy);color:#fff}
        .stat-card.brand-orange{background:var(--accent-cyan);color:#fff}
        .stat-card.brand-yellow{background:var(--brand-yellow);color:var(--brand-navy)}
        .stat-card.brand-surface{background:var(--surface);color:var(--brand-navy);border:1px solid var(--border);border-top:4px solid var(--danger)}
        .stat-lbl{font-size:.85rem;font-weight:500;opacity:.9;margin-bottom:.5rem}
        .stat-card.brand-surface .stat-lbl{color:var(--text-gray)}
        .stat-num{font-family:'Poppins',sans-serif;font-size:2.25rem;font-weight:700;line-height:1;margin-bottom:.25rem}

        /* PANELS */
        .dashboard-grid{display:grid;grid-template-columns:2fr 1fr;gap:1.5rem}
        .panel{background:var(--surface);border-radius:24px;margin-bottom:2rem;overflow:hidden;box-shadow:0 10px 40px var(--shadow-color);animation:fadeUp .4s ease both;transition:background .3s}
        .panel-head{display:flex;align-items:center;justify-content:space-between;padding:1.75rem 2rem 1rem;flex-wrap:wrap;gap:.75rem}
        .panel-title{font-family:'Poppins',sans-serif;font-size:1.2rem;font-weight:700;color:var(--text-dark)}
        .panel-cnt{font-size:.75rem;font-weight:700;background:var(--bg-light);color:var(--accent-cyan);padding:4px 10px;border-radius:20px;margin-left:10px;vertical-align:middle;border:1px solid var(--border)}

        /* BUTTONS */
        .btn{display:inline-flex;align-items:center;gap:8px;padding:.75rem 1.5rem;border-radius:12px;font-weight:700;font-size:.9rem;cursor:pointer;transition:.2s;border:none;font-family:'DM Sans',sans-serif}
        .btn-primary{background:var(--brand-navy);color:#fff}
        .btn-primary:hover{background:var(--navy-light);transform:translateY(-2px)}
        .btn-secondary{background:var(--bg-light);color:var(--text-dark);border:1px solid var(--border)}
        .btn-secondary:hover{background:var(--border)}

        /* CHARTS SECTION */
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        .chart-container { background: var(--surface); padding: 1.5rem; border-radius: 24px; box-shadow: 0 10px 40px var(--shadow-color); }
        .chart-title { font-family: 'Poppins'; font-weight: 700; margin-bottom: 1rem; color: var(--text-dark); }

        /* FINANCIAL TRACKER */
        .finance-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; padding: 1.5rem 2rem; background: var(--bg-light); border-radius: 16px; margin: 0 2rem 2rem; border: 1px solid var(--border); }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.8rem; font-weight: 700; color: var(--text-dark); }
        .form-group input, .form-group select { padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border); outline: none; font-family: inherit; }
        
        .table-responsive { overflow-x: auto; padding: 0 2rem 2rem; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 1rem; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        td { padding: 1rem; font-size: 0.9rem; color: var(--text-dark); border-bottom: 1px solid var(--border); }
        .type-badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; }
        .type-income { background: rgba(5,205,153,0.1); color: var(--success); }
        .type-expense { background: rgba(238,93,80,0.1); color: var(--danger); }

        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes livePulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.4}100%{transform:scale(1);opacity:1}}
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <a href="#" class="logo-wrapper">
                <div class="brand-text-wrap">
                    <div class="brand">E-NET <span>SUPREME</span></div>
                    <div class="badge-admin">Academy Admin</div>
                </div>
            </a>
        </div>
        <nav style="flex:1;overflow-y:auto">
            <div class="nav-label">Main Menu</div>
            <a href="#" class="nav-item active">Dashboard</a>
            <a href="#finance-section" class="nav-item">Financials</a>
            <a href="#analytics-section" class="nav-item">Analytics</a>
            <a href="#" class="nav-item">Students</a>
            <a href="#" class="nav-item">Courses</a>
        </nav>
    </aside>

    <main class="main-wrap">
        <header class="topbar">
            <div class="topbar-left">
                <div class="welcome-text">
                    <h1>Dashboard Overview</h1>
                    <p>Welcome back, Admin</p>
                </div>
            </div>
            <div class="topbar-right">
                <button class="icon-btn" onclick="cycleTheme()"><span id="theme-icon">☀️</span></button>
                <button class="header-logout-btn">Logout</button>
            </div>
        </header>

        <div class="content">
            <!-- Stats Overview -->
            <div class="stats-grid">
                <div class="stat-card brand-blue">
                    <div class="stat-lbl">Total Revenue</div>
                    <div class="stat-num" id="rev-total">₦0</div>
                </div>
                <div class="stat-card brand-orange">
                    <div class="stat-lbl">Total Income</div>
                    <div class="stat-num" id="total-income">₦0</div>
                </div>
                <div class="stat-card brand-yellow">
                    <div class="stat-lbl">Total Expenses</div>
                    <div class="stat-num" id="total-expenses">₦0</div>
                </div>
                <div class="stat-card brand-surface">
                    <div class="stat-lbl">Net Balance</div>
                    <div class="stat-num" id="net-balance">₦0</div>
                </div>
            </div>

            <!-- Charts Section -->
            <div class="charts-grid" id="analytics-section">
                <div class="chart-container">
                    <h3 class="chart-title">Income vs Expenses</h3>
                    <canvas id="financeChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3 class="chart-title">Monthly Growth</h3>
                    <canvas id="growthChart"></canvas>
                </div>
            </div>

            <!-- Financial Tracking Section -->
            <div class="panel" id="finance-section">
                <div class="panel-head">
                    <div class="panel-title">Financial Tracker <span class="panel-cnt" id="transaction-count">0</span></div>
                </div>
                
                <!-- Manual Entry Form -->
                <div class="finance-form">
                    <div class="form-group">
                        <label>Type</label>
                        <select id="trans-type">
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Paid By / To</label>
                        <input type="text" id="trans-party" placeholder="Name">
                    </div>
                    <div class="form-group">
                        <label>Amount (₦)</label>
                        <input type="number" id="trans-amount" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="trans-date">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="trans-desc" placeholder="What was it for?">
                    </div>
                    <div class="form-group" style="justify-content: flex-end;">
                        <button class="btn btn-primary" onclick="addTransaction()">Add Entry</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Party</th>
                                <th>Description</th>
                                <th>Amount</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="transaction-list">
                            <!-- Transactions will appear here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- Supabase Configuration ---
        // Note: In a real app, these would be your actual credentials
        // For this demo, we'll use a mock or local storage if Supabase isn't connected
        let _sb;
        try {
            // Placeholder for actual Supabase init from original code
            // _sb = supabase.createClient('URL', 'KEY');
        } catch(e) {}

        // --- Financial Logic ---
        let transactions = JSON.parse(localStorage.getItem('enet_transactions') || '[]');

        function updateUI() {
            const list = document.getElementById('transaction-list');
            list.innerHTML = '';
            
            let income = 0;
            let expense = 0;

            transactions.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach((t, index) => {
                const row = document.createElement('tr');
                const amt = Number(t.amount);
                if(t.type === 'income') income += amt; else expense += amt;

                row.innerHTML = `
                    <td>${new Date(t.date).toLocaleDateString()}</td>
                    <td><span class="type-badge type-${t.type}">${t.type.toUpperCase()}</span></td>
                    <td>${t.party}</td>
                    <td>${t.description}</td>
                    <td style="font-weight:700; color:${t.type === 'income' ? 'var(--success)' : 'var(--danger)'}">
                        ${t.type === 'income' ? '+' : '-'}₦${amt.toLocaleString()}
                    </td>
                    <td><button onclick="deleteTransaction(${index})" style="color:var(--danger); background:none; border:none; cursor:pointer;">Delete</button></td>
                `;
                list.appendChild(row);
            });

            document.getElementById('rev-total').textContent = '₦' + (income + expense).toLocaleString();
            document.getElementById('total-income').textContent = '₦' + income.toLocaleString();
            document.getElementById('total-expenses').textContent = '₦' + expense.toLocaleString();
            document.getElementById('net-balance').textContent = '₦' + (income - expense).toLocaleString();
            document.getElementById('transaction-count').textContent = transactions.length;

            updateCharts(income, expense);
        }

        function addTransaction() {
            const type = document.getElementById('trans-type').value;
            const party = document.getElementById('trans-party').value;
            const amount = document.getElementById('trans-amount').value;
            const date = document.getElementById('trans-date').value;
            const description = document.getElementById('trans-desc').value;

            if(!party || !amount || !date) {
                alert("Please fill in all required fields");
                return;
            }

            const newTrans = { type, party, amount, date, description };
            transactions.push(newTrans);
            localStorage.setItem('enet_transactions', JSON.stringify(transactions));
            
            // Reset form
            document.getElementById('trans-party').value = '';
            document.getElementById('trans-amount').value = '';
            document.getElementById('trans-desc').value = '';
            
            updateUI();
        }

        function deleteTransaction(index) {
            if(confirm("Delete this entry?")) {
                transactions.splice(index, 1);
                localStorage.setItem('enet_transactions', JSON.stringify(transactions));
                updateUI();
            }
        }

        // --- Charts Logic ---
        let financeChart, growthChart;

        function initCharts() {
            const ctx1 = document.getElementById('financeChart').getContext('2d');
            financeChart = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: ['Income', 'Expenses'],
                    datasets: [{
                        data: [0, 0],
                        backgroundColor: ['#05CD99', '#EE5D50'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
            });

            const ctx2 = document.getElementById('growthChart').getContext('2d');
            growthChart = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Revenue',
                        data: [12000, 19000, 15000, 25000, 22000, 30000],
                        borderColor: '#00a0df',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(0,160,223,0.1)'
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        }

        function updateCharts(income, expense) {
            if(financeChart) {
                financeChart.data.datasets[0].data = [income, expense];
                financeChart.update();
            }
        }

        // Initialize
        window.onload = () => {
            initCharts();
            updateUI();
            // Set default date to today
            document.getElementById('trans-date').valueAsDate = new Date();
        };

        function cycleTheme(){
            const cur = localStorage.getItem('enet_theme') || 'system';
            const themes = ['system','light','dark'];
            const next = themes[(themes.indexOf(cur)+1)%themes.length];
            localStorage.setItem('enet_theme',next);
            applyTheme(next);
        }
        function applyTheme(t){
            document.documentElement.setAttribute('data-theme', t==='system' && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : t);
        }
    </script>
</body>
</html>
