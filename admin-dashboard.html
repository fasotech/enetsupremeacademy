<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENET SUPREME ACADEMY | Admin Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy-blue: #2C1E85; --brand-red: #DA251D; --red-hover: #B81D15; --background: #F8F9FA; --border: #E2E8F0; --text-gray: #475467; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--background); color: var(--navy-blue); min-height: 100vh; display: flex; flex-direction: column; }
        header { background-color: var(--navy-blue); padding: 1rem 5%; color: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--brand-red); }
        .logo { font-weight: bold; text-transform: uppercase; }
        .logo span { color: var(--brand-red); }
        .main-container { max-width: 1200px; margin: 3rem auto; padding: 0 1.5rem; flex: 1; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 2rem; border-top: 4px solid var(--navy-blue); }
        h2 { margin-bottom: 1.5rem; color: var(--navy-blue); }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid var(--border); }
        th { background-color: #E0E7FF; color: var(--navy-blue); }
        .btn-approve { background-color: var(--brand-red); color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-approve:hover { background-color: var(--red-hover); }
        
        /* Fixed Logout Button */
        .logout-link { background: transparent; color: white; border: 1px solid white; padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.9rem; font-weight: bold; transition: 0.3s; }
        .logout-link:hover { background-color: rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <header>
        <div class="logo">ENET SUPREME <span>ADMIN</span> HUB</div>
        <button type="button" class="logout-link" onclick="executeLogout()">Log Out</button>
    </header>

    <main class="main-container">
        <section class="card" style="border-left: 5px solid #F59E0B; border-top: none;">
            <h2>Action Required: Pending Account Approvals</h2>
            <table>
                <thead><tr><th>Name</th><th>Email</th><th>Requested Role</th><th>Signup Date</th><th>Action</th></tr></thead>
                <tbody id="pending-users-list">
                    <tr><td colspan="5" style="text-align: center; color: var(--text-gray);">Fetching accounts...</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <script>
        const supabaseUrl = 'https://lskwzcvexyxjncttvimf.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxza3d6Y3ZleHl4am5jdHR2aW1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTIzNjEsImV4cCI6MjA4ODU4ODM2MX0.W8sEQ2ZtmBe-oqsznCX_UinJ2Jz2NNe0LuQct33VP2E';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // BULLETPROOF LOGOUT
        window.executeLogout = async function() {
            try { await supabase.auth.signOut(); } catch (err) {}
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = 'index.html'; // Immediately drops to Home Page
        };

        async function fetchDashboardData() {
            const pendingList = document.getElementById('pending-users-list');
            try {
                // Fetch all profiles
                const { data, error } = await supabase.from('profiles').select('*').order('created_at', { ascending: false });
                if (error) throw error;

                let pendingHTML = '';

                data.forEach(user => {
                    if (user.status === 'pending') {
                        const date = new Date(user.created_at).toLocaleDateString();
                        pendingHTML += `<tr id="row-${user.id}">
                            <td style="font-weight: bold;">${user.first_name} ${user.last_name}</td>
                            <td>${user.email || 'N/A'}</td>
                            <td style="text-transform: capitalize;">${user.role}</td>
                            <td>${date}</td>
                            <td><button class="btn-approve" onclick="approveUser('${user.id}')">Approve</button></td>
                        </tr>`;
                    }
                });

                pendingList.innerHTML = pendingHTML || `<tr><td colspan="5" style="text-align: center; font-weight:bold; color: #10B981;">No pending approvals!</td></tr>`;

            } catch (err) {
                pendingList.innerHTML = `<tr><td colspan="5" style="color: red; text-align: center;">Database Error: ${err.message}</td></tr>`;
            }
        }

        window.approveUser = async function(userId) {
            const btn = document.querySelector(`#row-${userId} button`);
            btn.innerText = "Approving..."; btn.disabled = true;
            const { error } = await supabase.from('profiles').update({ status: 'approved' }).eq('id', userId);
            if (error) { alert("Failed to approve user"); btn.disabled = false; btn.innerText = "Approve"; } 
            else { fetchDashboardData(); }
        }

        // Initialize directly
        fetchDashboardData();
    </script>
</body>
</html>
