<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        :root { --navy-blue: #2C1E85; --brand-red: #DA251D; --accent-blue: #2DAAE1; --background: #F8F9FA; --border: #E2E8F0; --text-gray: #475467; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--background); color: var(--navy-blue); min-height: 100vh; display: flex; flex-direction: column; }
        header { background-color: var(--navy-blue); padding: 1rem 5%; color: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--brand-red); }
        .logo { font-weight: bold; text-transform: uppercase; }
        .logo span { color: var(--brand-red); }
        .main-container { max-width: 1200px; margin: 3rem auto; padding: 0 1.5rem; flex: 1; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 2rem; border-top: 4px solid var(--navy-blue); }
        h2 { margin-bottom: 1.5rem; color: var(--navy-blue); }
        .dashboard-list { list-style: none; }
        .dashboard-list li { padding: 1rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .action-link { color: var(--brand-red); text-decoration: none; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid var(--border); }
        th { background-color: #E0E7FF; color: var(--navy-blue); }
        .logout-link { background: transparent; color: white; border: 1px solid white; padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.9rem; font-weight: bold; transition: 0.3s; }
        .logout-link:hover { background-color: rgba(255, 255, 255, 0.1); }
    </style>
</head>
