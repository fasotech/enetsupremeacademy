<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENET SUPREME ACADEMY | Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy-blue: #0A192F; --brand-green: #10B981; --text-main: #333333; --background: #F8F9FA; --white: #FFFFFF; --border: #E2E8F0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--background); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1.5rem; }
        .auth-logo { color: var(--navy-blue); font-size: 2rem; font-weight: 800; margin-bottom: 2rem; text-transform: uppercase; }
        .auth-logo span { color: var(--brand-green); }
        .auth-card { background: var(--white); max-width: 450px; width: 100%; padding: 3rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 4px; font-size: 1rem; }
        .btn-primary { width: 100%; background-color: var(--brand-green); color: white; border: none; padding: 0.8rem; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .btn-primary:hover { background-color: #059669; }
        #auth-error { color: #DC2626; margin-bottom: 1rem; font-size: 0.9rem; text-align: center; font-weight: bold; padding: 0.5rem; }
    </style>
</head>
<body>
    <div class="auth-logo">ENET SUPREME <span>ACADEMY</span></div>
    <section class="auth-card">
        <h2 style="color: var(--navy-blue); text-align: center; margin-bottom: 2rem;">Gateway Portal</h2>
        
        <div id="auth-error"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-primary" id="login-btn">Log In</button>
        </form>
    </section>

    <script>
        // Your actual Supabase URL and Legacy Anon Key
        const supabaseUrl = 'https://lskwzcvexyxjncttvimf.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxza3d6Y3ZleHl4am5jdHR2aW1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTIzNjEsImV4cCI6MjA4ODU4ODM2MX0.W8sEQ2ZtmBe-oqsznCX_UinJ2Jz2NNe0LuQct33VP2E'; 
        
        const errorDiv = document.getElementById('auth-error');
        const loginBtn = document.getElementById('login-btn');
        let supabase;

        try {
            supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        } catch (err) {
            errorDiv.innerText = "System Error: Invalid Supabase Key. Please check your code.";
            console.error(err);
        }

        const loginForm = document.getElementById('login-form');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            errorDiv.innerText = 'Authenticating...';
            errorDiv.style.color = '#10B981'; 
            loginBtn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // 1. Authenticate
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                
                if (error) throw error; 

                // 2. Fetch Role
                const userId = data.user.id;
                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('role')
                    .eq('id', userId)
                    .single();

                if (profileError || !profile) {
                    throw new Error("Profile record not found. Please contact support.");
                }

                // 3. Redirect based on role
                const role = profile.role;
                if (role === 'student') window.location.href = "student-dashboard.html";
                else if (role === 'teacher') window.location.href = "teacher-dashboard.html";
                else if (role === 'admin') window.location.href = "admin-dashboard.html";
                else throw new Error("Valid role not assigned.");

            } catch (err) {
                errorDiv.style.color = '#DC2626'; 
                errorDiv.innerText = err.message;
                if(supabase) await supabase.auth.signOut(); 
            } finally {
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
