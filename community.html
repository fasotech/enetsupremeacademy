<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENET SUPREME | Community Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const savedTheme = localStorage.getItem('enet_theme') || 'system';
        if (savedTheme === 'dark' || (savedTheme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>

    <style>
        :root {
            --orange: #FF7A00; --yellow: #FFC107; --danger: #EE5D50; --success: #05CD99;
            --royal-blue: #2441EA; --bg-light: #F4F7FE; --surface: #FFFFFF;
            --surface-hover: rgba(36, 65, 234, 0.04); --border: #E9EDF7; --border-bright: #D1D9EB;
            --text-dark: #2B3674; --text-muted: #A3AED0; --text-gray: #707EAE; 
            --topbar-bg: rgba(255, 255, 255, 0.9); --shadow-color: rgba(17, 38, 146, 0.05); --input-bg: #F4F7FE;
        }

        [data-theme="dark"] {
            --royal-blue: #4F3FFF; --bg-light: #07080F; --surface: #13151F;
            --surface-hover: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.08); --border-bright: rgba(255, 255, 255, 0.15);
            --text-dark: #F0F0FF; --text-muted: #7B7D9A; --text-gray: #A0AEC0; 
            --topbar-bg: rgba(7, 8, 15, 0.9); --shadow-color: rgba(0, 0, 0, 0.4); --input-bg: #1A1D2E;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg-light); color: var(--text-gray); min-height: 100vh; display: flex; flex-direction: column; transition: background-color 0.3s, color 0.3s; }

        header { background: var(--topbar-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0.9rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; transition: background-color 0.3s; }
        .logo { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 1.25rem; letter-spacing: -0.02em; text-transform: uppercase; color: var(--royal-blue); text-decoration: none; }
        .logo span { color: var(--orange); }

        .header-right { display: flex; align-items: center; gap: 1rem; }
        .icon-btn { position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); transition: 0.2s; color: var(--text-muted); box-shadow: 0 4px 15px var(--shadow-color); font-size: 1.1rem; }
        .icon-btn:hover { background: var(--bg-light); color: var(--royal-blue); transform: translateY(-2px); }

        #auth-controls { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; justify-content: center; }
        .user-pill { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border-bright); border-radius: 50px; padding: 5px 12px 5px 5px; font-size: 0.85rem; color: var(--text-dark); font-weight: 600; box-shadow: 0 2px 10px var(--shadow-color); cursor: pointer; transition: 0.2s; }
        .user-pill:hover { border-color: var(--royal-blue); }
        .user-pill .mini-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--royal-blue), var(--orange)); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 800; color: white; font-family: 'Poppins', sans-serif; object-fit: cover; }
        
        .nav-link { color: var(--text-gray); text-decoration: none; font-size: 0.85rem; font-weight: 600; padding: 0.5rem 1.2rem; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); transition: all 0.2s; white-space: nowrap; cursor: pointer;}
        .nav-link:hover { color: var(--royal-blue); border-color: var(--royal-blue); }
        .nav-link.logout { color: var(--danger); border-color: rgba(238, 93, 80, 0.2); }
        .nav-link.logout:hover { background: rgba(238, 93, 80, 0.1); border-color: var(--danger); }

        /* AUTH GATE */
        #auth-gate { display: none; flex: 1; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
        #auth-gate.visible { display: flex; }
        .gate-card { background: var(--surface); border: 1px solid var(--border-bright); border-radius: 24px; padding: 3rem 2.5rem; max-width: 460px; width: 100%; text-align: center; box-shadow: 0 20px 50px var(--shadow-color); animation: gateIn 0.5s cubic-bezier(0.16,1,0.3,1); }
        @keyframes gateIn { from { opacity:0; transform: scale(0.96) translateY(16px); } to { opacity:1; transform: scale(1) translateY(0); } }
        .gate-icon { font-size: 3.5rem; margin-bottom: 1rem; }
        .gate-card h2 { font-family: 'Poppins', sans-serif; font-size: 2rem; font-weight: 800; color: var(--text-dark); margin-bottom: 0.75rem; letter-spacing: -0.02em; }
        .gate-card h2 span { color: var(--royal-blue); }
        .gate-card p { color: var(--text-gray); font-size: 0.95rem; line-height: 1.65; margin-bottom: 1.75rem; }
        .btn-gate { display: block; width: 100%; padding: 1rem; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; text-decoration: none; text-align: center; transition: all 0.2s; border: none; }
        .btn-gate-primary { background: var(--royal-blue); color: white; margin-bottom: 0.75rem; box-shadow: 0 4px 15px rgba(36, 65, 234, 0.3); }
        .btn-gate-secondary { background: var(--surface); color: var(--text-dark); border: 1px solid var(--border-bright) !important; }

        /* COMMUNITY APP */
        #community-app { display: none; flex: 1; flex-direction: column; }
        #community-app.visible { display: flex; }
        .page-wrap { max-width: 680px; margin: 2.5rem auto; padding: 0 1rem; width: 100%; flex: 1; }
        .feed-header h1 { font-family: 'Poppins', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--text-dark); line-height: 1; margin-bottom:0.5rem;}
        .live-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(5, 205, 153, 0.1); border: 1px solid rgba(5, 205, 153, 0.2); color: var(--success); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 4px 12px; border-radius: 50px; margin-bottom: 1rem; }

        /* Create post */
        .create-post { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 4px 20px var(--shadow-color); transition: border-color 0.3s; }
        .composer-top { display: flex; gap: 12px; align-items: flex-start; }
        .composer-avatar { width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0; background: linear-gradient(135deg, var(--royal-blue), var(--orange)); display: flex; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 1.1rem; color: white; object-fit: cover; }
        .composer-area { flex: 1; }
        .composer-area textarea { width: 100%; background: transparent; border: none; color: var(--text-dark); font-size: 1rem; resize: none; outline: none; min-height: 80px; }
        .composer-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
        .attach-btn { display: flex; align-items: center; gap: 8px; background: var(--input-bg); color: var(--text-dark); border: 1px solid var(--border); border-radius: 10px; padding: 0.5rem 1rem; font-size: 0.85rem; font-weight: 600; cursor: pointer; position: relative; overflow: hidden; }
        .attach-btn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 100px; }
        .post-btn { background: var(--royal-blue); color: white; border: none; padding: 0.6rem 1.6rem; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
        
        /* Feed */
        .feed { display: flex; flex-direction: column; gap: 1.5rem; }
        .post-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px var(--shadow-color); }
        .post-body { padding: 1.5rem 1.5rem 1rem; }
        .post-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; }
        .post-author { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 1.1rem; color: white; object-fit: cover;}
        .author-info h4 { font-size: 0.95rem; font-weight: 700; color: var(--text-dark); }
        .role-badge { font-size: 0.65rem; padding: 3px 8px; border-radius: 6px; font-weight: 700; text-transform: uppercase; margin-left: 6px; }
        .post-text { font-size: 0.95rem; line-height: 1.7; color: var(--text-dark); margin-bottom: 1rem; white-space: pre-wrap; word-break: break-word; }
        .post-img { width: 100%; max-height: 450px; object-fit: cover; border-top: 1px solid var(--border); }
        
        /* Action Links (Edit/Delete) */
        .action-links { display: flex; gap: 10px; font-size: 0.75rem; font-weight: 600; }
        .action-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; transition: 0.2s; font-family: 'DM Sans'; font-weight: 600;}
        .action-btn:hover { color: var(--royal-blue); }

        /* Comments */
        .post-footer { padding: 0 1.5rem 1.5rem; }
        .comments-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.25rem; }
        .comment-item { display: flex; gap: 12px; }
        .c-avatar { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; background: var(--bg-light); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 800; color: var(--text-dark); object-fit: cover;}
        .c-bubble { background: var(--input-bg); padding: 0.75rem 1rem; border-radius: 12px; flex: 1; }
        .c-bubble h5 { font-size: 0.85rem; font-weight: 700; color: var(--text-dark); margin-bottom: 3px; display: flex; justify-content: space-between;}
        .reply-box { display: flex; gap: 10px; align-items: center; }
        .reply-box input { flex: 1; background: var(--input-bg); border: 1px solid var(--border); color: var(--text-dark); border-radius: 10px; padding: 0.7rem 1rem; outline: none; }
        .reply-btn { background: var(--surface); color: var(--royal-blue); border: 1px solid var(--border-bright); padding: 0.65rem 1.25rem; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* SETTINGS MODAL */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: var(--surface); border: 1px solid var(--border-bright); border-radius: 24px; padding: 2.5rem; width: 100%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); position: relative; animation: slideUp 0.3s ease; }
        .modal-close { position: absolute; top: 1.5rem; right: 1.5rem; background: none; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; }
        .modal-title { font-family: 'Poppins', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--text-dark); margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.4rem; text-transform: uppercase; }
        .form-group input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; color: var(--text-dark); font-size: 0.95rem; outline: none; }
        
        .avatar-upload-wrapper { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
        .avatar-preview { width: 70px; height: 70px; border-radius: 50%; background: var(--input-bg); border: 2px dashed var(--royal-blue); object-fit: cover; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.5rem; color: var(--text-muted);}
        .upload-btn { background: var(--surface-hover); color: var(--royal-blue); border: 1px solid var(--border-bright); padding: 0.5rem 1rem; border-radius: 8px; font-weight: 600; font-size: 0.85rem; cursor: pointer; position: relative; overflow: hidden;}
        .upload-btn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--surface); border: 1px solid var(--border-bright); color: var(--text-dark); padding: 0.85rem 1.5rem; border-radius: 12px; font-weight: 600; z-index: 9999; transition: transform 0.4s; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">ENET <span>SUPREME</span></a>
    <div class="header-right">
        <button class="icon-btn" onclick="cycleTheme()" title="Switch Theme"><span id="theme-icon">💻</span></button>
        <div id="auth-controls"></div>
    </div>
</header>

<section id="auth-gate">
    <div class="gate-card">
        <h2>Join the <span>Community</span></h2>
        <p>Connect with students, teachers, and mentors.</p>
        <a href="login.html?redirect=community.html" class="btn-gate btn-gate-primary">Log In to Access</a>
    </div>
</section>

<div id="community-app">
    <div class="page-wrap">
        <div class="feed-header">
            <div class="live-badge">Live Feed</div>
            <h1>Community Hub</h1>
        </div>

        <div class="create-post">
            <div class="composer-top">
                <img class="composer-avatar" id="composer-avatar" src="" alt="">
                <div class="composer-area">
                    <textarea id="post-text" placeholder="Share something with the community…" rows="3"></textarea>
                </div>
            </div>
            <div class="composer-footer">
                <button class="post-btn" id="submit-btn" onclick="createPost()">Post to Feed</button>
            </div>
        </div>

        <div class="feed" id="feed"></div>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeSettings()">✕</button>
        <h3 class="modal-title">Profile Settings</h3>
        
        <div class="avatar-upload-wrapper">
            <img id="set-avatar-preview" class="avatar-preview" src="" alt="Avatar">
            <div class="upload-btn">
                Upload Passport/Avatar
                <input type="file" accept="image/*" onchange="handleAvatarSelect(event)">
            </div>
        </div>

        <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex:1;"><label>First Name</label><input type="text" id="set-first"></div>
            <div class="form-group" style="flex:1;"><label>Last Name</label><input type="text" id="set-last"></div>
        </div>
        <div class="form-group"><label>Phone Number</label><input type="tel" id="set-phone"></div>
        <div class="form-group"><label>Address</label><input type="text" id="set-address"></div>
        
        <button class="post-btn" style="width: 100%; margin-top: 1rem;" onclick="saveSettings()" id="save-set-btn">Save Changes</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// THEME
const themes = ['system', 'light', 'dark'];
const themeIcons = { 'system': '💻', 'light': '☀️', 'dark': '🌙' };
function cycleTheme() {
    let current = localStorage.getItem('enet_theme') || 'system';
    let nextTheme = themes[(themes.indexOf(current) + 1) % themes.length];
    localStorage.setItem('enet_theme', nextTheme); applyTheme(nextTheme);
}
function applyTheme(theme) {
    document.getElementById('theme-icon').textContent = themeIcons[theme];
    document.documentElement.setAttribute('data-theme', theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : theme);
}

// SUPABASE SETUP
const sb = window.supabase.createClient('https://lskwzcvexyxjncttvimf.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxza3d6Y3ZleHl4am5jdHR2aW1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTIzNjEsImV4cCI6MjA4ODU4ODM2MX0.W8sEQ2ZtmBe-oqsznCX_UinJ2Jz2NNe0LuQct33VP2E');

let currentUser = null;
let currentProfile = null;
let newAvatarFile = null;

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show';
    setTimeout(() => t.className = 'toast', 3000);
}

// INITIALIZE
window.addEventListener('load', async () => {
    applyTheme(localStorage.getItem('enet_theme') || 'system');
    const { data: { session } } = await sb.auth.getSession();

    if (!session) {
        document.getElementById('auth-gate').classList.add('visible');
        document.getElementById('auth-controls').innerHTML = `<a href="login.html?redirect=community.html" class="nav-link">Log In</a>`;
        return;
    }
    currentUser = session.user;
    await loadUserProfile();
});

async function loadUserProfile() {
    const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    currentProfile = profile;

    if (!profile || profile.status === 'pending') return; // Handled in previous logic

    const name = `${profile.first_name || ''} ${profile.last_name || ''}`.trim() || 'User';
    const role = profile.role || 'student';
    const avatar = profile.avatar_url || 'https://ui-avatars.com/api/?name=' + name + '&background=random';

    // Populate Header
    document.getElementById('auth-controls').innerHTML = `
        <div class="user-pill" onclick="openSettings()" title="Edit Profile">
            <img class="mini-avatar" src="${avatar}">
            <span>${name}</span>
        </div>
        <a href="${role === 'admin' ? 'admin-dashboard.html' : role === 'teacher' ? 'teacher.html' : 'student.html'}" class="nav-link">Dashboard</a>
        <button class="nav-link logout" onclick="doLogout()">Log Out</button>
    `;

    document.getElementById('composer-avatar').src = avatar;
    document.getElementById('community-app').classList.add('visible');

    fetchFeed();
}

// ── PROFILE SETTINGS LOGIC ──
function openSettings() {
    document.getElementById('set-first').value = currentProfile.first_name || '';
    document.getElementById('set-last').value = currentProfile.last_name || '';
    document.getElementById('set-phone').value = currentProfile.phone || '';
    document.getElementById('set-address').value = currentProfile.address || '';
    document.getElementById('set-avatar-preview').src = currentProfile.avatar_url || 'https://ui-avatars.com/api/?name=' + (currentProfile.first_name||'U');
    document.getElementById('settings-modal').classList.add('show');
}
function closeSettings() { document.getElementById('settings-modal').classList.remove('show'); newAvatarFile = null; }

function handleAvatarSelect(e) {
    const file = e.target.files[0];
    if (!file) return;
    newAvatarFile = file;
    document.getElementById('set-avatar-preview').src = URL.createObjectURL(file);
}

async function saveSettings() {
    const btn = document.getElementById('save-set-btn');
    btn.disabled = true; btn.textContent = 'Saving...';
    try {
        let avatarUrl = currentProfile.avatar_url;
        if (newAvatarFile) {
            const fileName = `avatar_${currentUser.id}_${Date.now()}`;
            await sb.storage.from('community_images').upload(fileName, newAvatarFile, { upsert: true });
            const { data } = sb.storage.from('community_images').getPublicUrl(fileName);
            avatarUrl = data.publicUrl;
        }

        const updates = {
            first_name: document.getElementById('set-first').value.trim(),
            last_name: document.getElementById('set-last').value.trim(),
            phone: document.getElementById('set-phone').value.trim(),
            address: document.getElementById('set-address').value.trim(),
            avatar_url: avatarUrl
        };

        const { error } = await sb.from('profiles').update(updates).eq('id', currentUser.id);
        if (error) throw error;
        
        showToast('Profile updated successfully!');
        closeSettings();
        await loadUserProfile(); // Refresh header
        fetchFeed(); // Refresh feed to show new avatar
    } catch(err) { alert(err.message); }
    btn.disabled = false; btn.textContent = 'Save Changes';
}

// ── POST & COMMENT LOGIC (WITH EDITS) ──
async function createPost() {
    const text = document.getElementById('post-text').value.trim();
    if (!text) return;
    await sb.from('posts').insert([{ user_id: currentUser.id, content: text }]);
    document.getElementById('post-text').value = '';
    fetchFeed();
}

async function fetchFeed() {
    const { data: posts } = await sb.from('posts').select('*, profiles(*)').order('created_at', { ascending: false });
    const { data: comments } = await sb.from('comments').select('*, profiles(*)').order('created_at', { ascending: true });
    
    const feed = document.getElementById('feed');
    feed.innerHTML = '';
    
    posts.forEach(post => {
        const isMine = post.user_id === currentUser?.id;
        const name = `${post.profiles?.first_name||''} ${post.profiles?.last_name||''}` || 'User';
        const avatar = post.profiles?.avatar_url || 'https://ui-avatars.com/api/?name=' + name + '&background=random';
        const postComments = comments.filter(c => c.post_id === post.id);

        let cHtml = '';
        postComments.forEach(c => {
            const cMine = c.user_id === currentUser?.id;
            const cName = `${c.profiles?.first_name||''} ${c.profiles?.last_name||''}` || 'User';
            const cAvatar = c.profiles?.avatar_url || 'https://ui-avatars.com/api/?name=' + cName;
            cHtml += `
            <div class="comment-item">
                <img class="c-avatar" src="${cAvatar}">
                <div class="c-bubble">
                    <h5>${cName} ${cMine ? `<button class="action-btn" onclick="editComment('${c.id}', '${c.content.replace(/'/g, "\\'")}')">✎ Edit</button>` : ''}</h5>
                    <p id="c-text-${c.id}">${c.content}</p>
                </div>
            </div>`;
        });

        feed.innerHTML += `
        <div class="post-card">
            <div class="post-body">
                <div class="post-header">
                    <div class="post-author">
                        <img class="avatar" src="${avatar}">
                        <div class="author-info">
                            <h4>${name}</h4>
                        </div>
                    </div>
                    ${isMine ? `<div class="action-links"><button class="action-btn" onclick="editPost('${post.id}', '${post.content.replace(/'/g, "\\'")}')">✎ Edit</button></div>` : ''}
                </div>
                <div class="post-text" id="p-text-${post.id}">${post.content}</div>
            </div>
            <div class="post-footer">
                <div class="comments-list">${cHtml}</div>
                <div class="reply-box">
                    <input type="text" id="reply-${post.id}" placeholder="Write a reply..." onkeydown="if(event.key==='Enter') addComment('${post.id}')">
                    <button class="reply-btn" onclick="addComment('${post.id}')">Send</button>
                </div>
            </div>
        </div>`;
    });
}

async function addComment(postId) {
    const input = document.getElementById(`reply-${postId}`);
    if (!input.value.trim()) return;
    await sb.from('comments').insert([{ post_id: postId, user_id: currentUser.id, content: input.value.trim() }]);
    fetchFeed();
}

// ── INLINE EDITING ──
async function editPost(id, oldText) {
    const newText = prompt("Edit your post:", oldText);
    if (newText !== null && newText.trim() !== "" && newText !== oldText) {
        await sb.from('posts').update({ content: newText.trim() }).eq('id', id);
        fetchFeed();
    }
}

async function editComment(id, oldText) {
    const newText = prompt("Edit your comment:", oldText);
    if (newText !== null && newText.trim() !== "" && newText !== oldText) {
        await sb.from('comments').update({ content: newText.trim() }).eq('id', id);
        fetchFeed();
    }
}

function doLogout() { localStorage.clear(); sessionStorage.clear(); window.location.href = 'index.html'; }
</script>
