<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENET SUPREME ACADEMY | Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy-blue: #0A192F; --brand-green: #10B981; --text-main: #333333; --background: #F8F9FA; --white: #FFFFFF; --border: #E2E8F0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--background); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1.5rem; }
        .auth-logo { color: var(--navy-blue); font-size: 2rem; font-weight: 800; margin-bottom: 2rem; text-transform: uppercase; }
        .auth-logo span { color: var(--brand-green); }
        .auth-card { background: var(--white); max-width: 450px; width: 100%; padding: 3rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 4px; font-size: 1rem; }
        .btn-primary { width: 100%; background-color: var(--brand-green); color: white; border: none; padding: 0.8rem; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .btn-primary:hover { background-color: #059669; }
        #auth-error { color: #DC2626; margin-bottom: 1rem; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>
    <div class="auth-logo">ENET SUPREME <span>ACADEMY</span></div>
    <section class="auth-card">
        <h2 style="color: var(--navy-blue); text-align: center; margin-bottom: 2rem;">Gateway Portal</h2>
        <div id="auth-error"></div>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-primary">Log In</button>
        </form>
    </section>

    <script>
        const supabaseUrl = 'https://lskwzcvexyxjncttvimf.supabase.co';
        const supabaseKey = 'sb_publishable_ANuu6mHR75vfpRy28doPgQ_3FPFaur2';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const loginForm = document.getElementById('login-form');
        const errorDiv = document.getElementById('auth-error');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.innerText = '';
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                errorDiv.innerText = error.message;
            } else {
                const userId = data.user.id;
                const { data: profile, error: profileError } = await supabase.from('profiles').select('role').eq('id', userId).single();

                if (profileError || !profile) {
                    errorDiv.innerText = "Fatal error: Profile record not found.";
                    await supabase.auth.signOut();
                    return;
                }

                const role = profile.role;
                if (role === 'student') window.location.href = "student-dashboard.html";
                else if (role === 'teacher') window.location.href = "teacher-dashboard.html";
                else if (role === 'admin') window.location.href = "admin-dashboard.html";
                else { errorDiv.innerText = "Fatal error: Valid role not assigned."; await supabase.auth.signOut(); }
            }
        });
    </script>
</body>
</html>
