<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENET SUPREME ACADEMY | Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* === ENET SUPREME BRANDING STYLES === */
        :root { 
            --navy-blue: #02014a; 
            --brand-yellow: #fcd116; 
            --yellow-hover: #e0b800; 
            --accent-cyan: #00a0df; 
            --text-main: #333333; 
            --background: #F8F9FA; 
            --white: #FFFFFF; 
            --border: #E2E8F0; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: var(--background); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 1.5rem; 
        }
        
        .auth-logo { 
            color: var(--navy-blue); 
            font-size: 2.2rem; 
            font-weight: 800; 
            margin-bottom: 2rem; 
            text-transform: uppercase; 
            text-align: center; 
            letter-spacing: 1px;
        }
        
        .auth-logo span { 
            color: var(--brand-yellow); 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        .auth-card { 
            background: var(--white); 
            max-width: 450px; 
            width: 100%; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            border-top: 5px solid var(--accent-cyan); 
        }
        
        h2 { 
            text-align: center; 
            color: var(--navy-blue); 
            margin-bottom: 1.5rem; 
            font-weight: 800;
        }
        
        .form-group { margin-bottom: 1.2rem; }
        
        label { 
            display: block; 
            margin-bottom: 0.5rem; 
            font-weight: 600; 
            font-size: 0.9rem;
            color: var(--navy-blue);
        }
        
        input { 
            width: 100%; 
            padding: 0.8rem 1rem; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            font-size: 1rem; 
            transition: all 0.3s ease;
            outline: none;
        }
        
        input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(0, 160, 223, 0.1);
        }
        
        .btn-primary { 
            width: 100%; 
            background-color: var(--brand-yellow); 
            color: var(--navy-blue); 
            border: none; 
            padding: 1rem; 
            border-radius: 6px; 
            font-size: 1.05rem; 
            font-weight: 800; 
            cursor: pointer; 
            transition: background-color 0.3s ease; 
            margin-top: 1rem; 
        }
        
        .btn-primary:hover { 
            background-color: var(--yellow-hover); 
        }
        
        .btn-primary:disabled { 
            background-color: #e2e8f0; 
            color: #a0aec0;
            cursor: not-allowed; 
        }
        
        #auth-message { 
            margin-bottom: 1.5rem; 
            font-size: 0.9rem; 
            text-align: center; 
            font-weight: bold; 
            padding: 0.8rem; 
            border-radius: 6px; 
            display: none; 
        }
        
        .register-link { 
            display: block; 
            text-align: center; 
            margin-top: 1.5rem; 
            color: var(--text-gray); 
            text-decoration: none; 
            font-size: 0.95rem; 
            font-weight: 500;
        }
        
        .register-link span { 
            color: var(--accent-cyan); 
            font-weight: 800; 
            transition: color 0.2s;
        }
        
        .register-link:hover span {
            color: var(--navy-blue);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-logo">ENET SUPREME <br><span>ACADEMY</span></div>
    
    <section class="auth-card">
        <h2>Gateway Portal</h2>
        
        <div id="auth-message"></div>
        
        <form id="login-form" onsubmit="event.preventDefault(); attemptLogin(); return false;">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary" id="login-btn">Secure Log In</button>
        </form>

        <a href="register.html" class="register-link">Don't have an account? <span>Apply here</span></a>
    </section>

    <script>
        function showMessage(text, isError) {
            const msgDiv = document.getElementById('auth-message');
            msgDiv.style.display = 'block';
            msgDiv.style.backgroundColor = isError ? '#fee2e2' : '#e0f2fe';
            msgDiv.style.color = isError ? '#DC2626' : 'var(--navy-blue)';
            msgDiv.innerText = text;
        }

        async function attemptLogin() {
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            showMessage('Authenticating securely...', false);

            try {
                // Failsafe: Check if the Supabase library loaded properly
                if (typeof window.supabase === 'undefined') {
                    throw new Error("Cannot connect to the database. Please check your internet connection or disable adblockers.");
                }

                // Initialize Supabase ONLY when the button is clicked
                const supabaseUrl = 'https://lskwzcvexyxjncttvimf.supabase.co';
                const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxza3d6Y3ZleHl4am5jdHR2aW1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTIzNjEsImV4cCI6MjA4ODU4ODM2MX0.W8sEQ2ZtmBe-oqsznCX_UinJ2Jz2NNe0LuQct33VP2E'; 
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;

                // 1. Check Credentials
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                if (error) throw new Error(error.message);

                // 2. Fetch Role
                const { data: profile, error: profileError } = await supabase.from('profiles').select('role, status').eq('id', data.user.id).single();
                if (profileError || !profile) throw new Error("Profile not found in database.");

                // 3. Security Block
                if (profile.role !== 'admin' && profile.status === 'pending') {
                    await supabase.auth.signOut();
                    throw new Error("Your account is pending Admin approval. Please check back later.");
                }

                // 4. Success Routing
                showMessage('Success! Redirecting...', false);
                if (profile.role === 'admin') window.location.href = "admin-dashboard.html";
                else if (profile.role === 'teacher') window.location.href = "teacher-dashboard.html";
                else window.location.href = "student-dashboard.html";

            } catch (err) {
                showMessage("Error: " + err.message, true);
                // Safe Sign Out if it partially fails
                if (typeof window.supabase !== 'undefined') {
                    const tempSupa = window.supabase.createClient('https://lskwzcvexyxjncttvimf.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxza3d6Y3ZleHl4am5jdHR2aW1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTIzNjEsImV4cCI6MjA4ODU4ODM2MX0.W8sEQ2ZtmBe-oqsznCX_UinJ2Jz2NNe0LuQct33VP2E');
                    await tempSupa.auth.signOut();
                }
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
