<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENET SUPREME ACADEMY | Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* === ENET SUPREME BRANDING STYLES === */
        :root { 
            --navy-blue: #02014a; 
            --brand-yellow: #fcd116; 
            --yellow-hover: #e0b800; 
            --accent-cyan: #00a0df; 
            --text-main: #333333; 
            --background: #F8F9FA; 
            --white: #FFFFFF; 
            --border: #E2E8F0; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: var(--background); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 1.5rem; 
        }
        
        .auth-logo { 
            color: var(--navy-blue); 
            font-size: 2.2rem; 
            font-weight: 800; 
            margin-bottom: 2rem; 
            text-transform: uppercase; 
            text-align: center; 
            letter-spacing: 1px;
            text-decoration: none;
        }
        
        .auth-logo span { 
            color: var(--brand-yellow); 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        .auth-card { 
            background: var(--white); 
            max-width: 450px; 
            width: 100%; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            border-top: 5px solid var(--accent-cyan); 
            transition: 0.3s ease;
        }
        
        h2 { text-align: center; color: var(--navy-blue); margin-bottom: 1.5rem; font-weight: 800; }
        .sub-text { text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem; }
        
        .form-group { margin-bottom: 1.2rem; position: relative;}
        
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: var(--navy-blue); }
        
        input { 
            width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border); 
            border-radius: 6px; font-size: 1rem; transition: all 0.3s ease; outline: none;
        }
        /* Extra padding on the right so text doesn't hide behind the eye icon */
        input[type="password"], .password-wrapper input[type="text"] { padding-right: 2.5rem; }
        
        input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 3px rgba(0, 160, 223, 0.1); }
        
        /* Professional SVG Password Toggle */
        .password-wrapper { position: relative; }
        .toggle-password { 
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%); 
            background: none; border: none; cursor: pointer; color: #94a3b8;
            display: flex; align-items: center; justify-content: center; padding: 5px;
        }
        .toggle-password:hover { color: var(--accent-cyan); }

        .btn-primary { 
            width: 100%; background-color: var(--brand-yellow); color: var(--navy-blue); 
            border: none; padding: 1rem; border-radius: 6px; font-size: 1.05rem; 
            font-weight: 800; cursor: pointer; transition: background-color 0.3s ease; 
            margin-top: 1rem; 
        }
        .btn-primary:hover { background-color: var(--yellow-hover); }
        .btn-primary:disabled { background-color: #e2e8f0; color: #a0aec0; cursor: not-allowed; }
        
        .message-box { 
            margin-bottom: 1.5rem; font-size: 0.9rem; text-align: center; 
            font-weight: 600; padding: 0.8rem; border-radius: 6px; display: none; 
        }
        
        .register-link { display: block; text-align: center; margin-top: 1.5rem; color: #64748b; text-decoration: none; font-size: 0.95rem; font-weight: 500;}
        .register-link span { color: var(--accent-cyan); font-weight: 800; transition: color 0.2s;}
        .register-link:hover span { color: var(--navy-blue); text-decoration: underline;}

        .forgot-password { display: block; text-align: right; margin-top: 0.5rem; font-size: 0.85rem; color: var(--accent-cyan); font-weight: 600; text-decoration: none; cursor: pointer;}
        .forgot-password:hover { text-decoration: underline; color: var(--navy-blue); }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <a href="index.html" class="auth-logo">ENET SUPREME <br><span>ACADEMY</span></a>
    
    <section class="auth-card" id="login-section">
        <h2>Gateway Portal</h2>
        <div class="message-box" id="auth-message"></div>
        
        <form id="login-form" onsubmit="event.preventDefault(); attemptLogin(); return false;">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="login-password" required placeholder="••••••••">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('login-password', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
                <span class="forgot-password" onclick="toggleResetForm()">Forgot Password?</span>
            </div>
            <button type="submit" class="btn-primary" id="login-btn">Secure Log In</button>
        </form>

        <a href="register.html" class="register-link">Don't have an account? <span>Apply here</span></a>
    </section>

    <section class="auth-card hidden" id="reset-section">
        <h2>Reset Password</h2>
        <p class="sub-text">Enter your email address below and we'll send you a secure link to reset your password.</p>
        
        <div class="message-box" id="reset-message"></div>
        
        <form id="reset-form" onsubmit="event.preventDefault(); attemptPasswordReset(); return false;">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="reset-email" required placeholder="your@email.com">
            </div>
            <button type="submit" class="btn-primary" id="reset-btn">Send Reset Link</button>
        </form>

        <a href="#" class="register-link" onclick="toggleResetForm(); return false;">Back to <span>Secure Log In</span></a>
    </section>

    <section class="auth-card hidden" id="update-section">
        <h2>Set New Password</h2>
        <p class="sub-text">Welcome back! Please enter your new secure password below.</p>
        
        <div class="message-box" id="update-message"></div>
        
        <form id="update-form" onsubmit="event.preventDefault(); updatePassword(); return false;">
            <div class="form-group">
                <label>New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="new-password" required placeholder="••••••••" minlength="6">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('new-password', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-primary" id="update-btn">Update Password</button>
        </form>
    </section>

    <script>
        const supabaseUrl = 'https://lskwzcvexyxjncttvimf.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxza3d6Y3ZleHl4am5jdHR2aW1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTIzNjEsImV4cCI6MjA4ODU4ODM2MX0.W8sEQ2ZtmBe-oqsznCX_UinJ2Jz2NNe0LuQct33VP2E'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        /* === UI HELPERS === */
        function showMessage(text, isError, elementId) {
            const msgDiv = document.getElementById(elementId);
            msgDiv.style.display = 'block';
            msgDiv.style.backgroundColor = isError ? '#fee2e2' : '#e0f2fe';
            msgDiv.style.color = isError ? '#DC2626' : 'var(--navy-blue)';
            msgDiv.innerText = text;
        }

        // Professional SVG Toggle Logic
        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const eyeOpen = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
            const eyeSlashed = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

            if (input.type === "password") {
                input.type = "text";
                btn.innerHTML = eyeSlashed;
            } else {
                input.type = "password";
                btn.innerHTML = eyeOpen;
            }
        }

        function toggleResetForm() {
            document.getElementById('login-section').classList.toggle('hidden');
            document.getElementById('reset-section').classList.toggle('hidden');
            document.getElementById('auth-message').style.display = 'none';
            document.getElementById('reset-message').style.display = 'none';
            document.getElementById('reset-email').value = document.getElementById('login-email').value;
        }

        /* === INITIALIZATION (Check if returning from email link) === */
        window.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash;
            // Supabase attaches access_token and type=recovery to the URL hash when a user clicks the reset email
            if (hash && hash.includes('type=recovery')) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('reset-section').classList.add('hidden');
                document.getElementById('update-section').classList.remove('hidden');
            }
        });

        /* === LOGIN LOGIC === */
        async function attemptLogin() {
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            showMessage('Authenticating securely...', false, 'auth-message');

            try {
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;

                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw new Error("Invalid email or password.");

                const { data: profile, error: profileError } = await supabase.from('profiles').select('role, status').eq('id', data.user.id).single();
                if (profileError || !profile) throw new Error("Profile not found in database.");

                if (profile.role !== 'admin' && profile.status === 'pending') {
                    await supabase.auth.signOut();
                    throw new Error("Your account is pending Admin approval. Please check back later.");
                }

                showMessage('Success! Redirecting...', false, 'auth-message');
                
                const urlParams = new URLSearchParams(window.location.search);
                const redirectUrl = urlParams.get('redirect');
                
                if (redirectUrl) window.location.href = redirectUrl;
                else if (profile.role === 'admin') window.location.href = "admin-dashboard.html";
                else if (profile.role === 'teacher') window.location.href = "teacher-dashboard.html";
                else window.location.href = "student-dashboard.html";

            } catch (err) {
                showMessage(err.message, true, 'auth-message');
                if (typeof window.supabase !== 'undefined') await supabase.auth.signOut();
            } finally {
                btn.disabled = false;
            }
        }

        /* === REQUEST RESET EMAIL === */
        async function attemptPasswordReset() {
            const btn = document.getElementById('reset-btn');
            const email = document.getElementById('reset-email').value;
            
            btn.disabled = true;
            showMessage('Checking database...', false, 'reset-message');

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/login.html',
                });

                if (error) throw error;

                showMessage('If an account matches that email, a password reset link has been sent. Please check your inbox.', false, 'reset-message');
                
            } catch (err) {
                showMessage("Notice: " + err.message, true, 'reset-message');
            } finally {
                btn.disabled = false;
            }
        }

        /* === SET NEW PASSWORD (Final Step) === */
        async function updatePassword() {
            const btn = document.getElementById('update-btn');
            const newPassword = document.getElementById('new-password').value;
            
            btn.disabled = true;
            showMessage('Updating your password...', false, 'update-message');

            try {
                // This command works because Supabase stored an active session from the recovery link hash
                const { error } = await supabase.auth.updateUser({ password: newPassword });
                if (error) throw error;

                showMessage('Password updated successfully! Redirecting you to login...', false, 'update-message');
                
                setTimeout(() => {
                    // Strip the hash from the URL and reload to force them to log in with new credentials
                    window.location.href = window.location.pathname; 
                }, 2500);

            } catch(err) {
                showMessage("Error: " + err.message, true, 'update-message');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
