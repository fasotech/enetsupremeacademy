<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENET SUPREME ACADEMY | Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy-blue: #2C1E85; --brand-red: #DA251D; --red-hover: #B81D15; --text-main: #333333; --background: #F8F9FA; --white: #FFFFFF; --border: #E2E8F0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--background); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1.5rem; }
        .auth-logo { color: var(--navy-blue); font-size: 2rem; font-weight: 800; margin-bottom: 2rem; text-transform: uppercase; text-align: center; }
        .auth-logo span { color: var(--brand-red); }
        .auth-card { background: var(--white); max-width: 450px; width: 100%; padding: 2.5rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid var(--navy-blue); }
        
        h2 { text-align: center; color: var(--navy-blue); margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 500; font-size: 0.9rem;}
        input { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 4px; font-size: 1rem; }
        .btn-primary { width: 100%; background-color: var(--brand-red); color: white; border: none; padding: 1rem; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 1rem; }
        .btn-primary:hover { background-color: var(--red-hover); }
        
        #auth-message { margin-bottom: 1rem; font-size: 0.9rem; text-align: center; font-weight: bold; padding: 0.8rem; border-radius: 4px; display: none; }
        .register-link { display: block; text-align: center; margin-top: 1.5rem; color: var(--text-gray); text-decoration: none; font-size: 0.9rem; }
        .register-link span { color: var(--brand-red); font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-logo">ENET SUPREME <br><span>ACADEMY</span></div>
    
    <section class="auth-card">
        <h2>Gateway Portal</h2>
        
        <div id="auth-message"></div>
        
        <form id="login-form">
            <div class="form-group"><label>Email Address</label><input type="email" id="login-email" required placeholder="your@email.com"></div>
            <div class="form-group"><label>Password</label><input type="password" id="login-password" required></div>
            <button type="submit" class="btn-primary" id="login-btn">Secure Log In</button>
        </form>

        <a href="register.html" class="register-link">Don't have an account? <span>Apply here</span></a>
    </section>

    <script>
        const supabaseUrl = 'https://lskwzcvexyxjncttvimf.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxza3d6Y3ZleHl4am5jdHR2aW1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTIzNjEsImV4cCI6MjA4ODU4ODM2MX0.W8sEQ2ZtmBe-oqsznCX_UinJ2Jz2NNe0LuQct33VP2E'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        const msgDiv = document.getElementById('auth-message');

        function showMessage(text, isError) {
            msgDiv.style.display = 'block';
            msgDiv.style.backgroundColor = isError ? '#fee2e2' : '#E0E7FF';
            msgDiv.style.color = isError ? '#DC2626' : '#2C1E85';
            msgDiv.innerText = text;
        }

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            document.getElementById('login-btn').disabled = true;
            showMessage('Authenticating...', false);

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: document.getElementById('login-email').value,
                    password: document.getElementById('login-password').value
                });
                if (error) throw new Error(error.message);

                const { data: profile, error: profileError } = await supabase.from('profiles').select('role, status').eq('id', data.user.id).single();
                if (profileError || !profile) throw new Error("Profile not found.");

                if (profile.role !== 'admin' && profile.status === 'pending') {
                    await supabase.auth.signOut();
                    throw new Error("Your account is pending Admin approval. Please check back later.");
                }

                showMessage('Success! Redirecting...', false);
                if (profile.role === 'admin') window.location.href = "admin-dashboard.html";
                else if (profile.role === 'teacher') window.location.href = "teacher-dashboard.html";
                else window.location.href = "student-dashboard.html";

            } catch (err) {
                showMessage("Error: " + err.message, true);
                await supabase.auth.signOut();
            } finally {
                document.getElementById('login-btn').disabled = false;
            }
        });
    </script>
</body>
</html>
