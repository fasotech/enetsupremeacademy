<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENET SUPREME ACADEMY | Login</title>
    <style>
        :root { 
            --navy-blue: #02014a; 
            --brand-yellow: #fcd116; 
            --yellow-hover: #e0b800; 
            --accent-cyan: #00a0df; 
            --text-main: #333333; 
            --background: #F8F9FA; 
            --white: #FFFFFF; 
            --border: #E2E8F0; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: var(--background); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 1.5rem; 
        }
        
        .auth-logo { 
            color: var(--navy-blue); 
            font-size: 2.2rem; 
            font-weight: 800; 
            margin-bottom: 2rem; 
            text-transform: uppercase; 
            text-align: center; 
            letter-spacing: 1px;
            text-decoration: none;
        }
        
        .auth-logo span { 
            color: var(--brand-yellow); 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        .auth-card { 
            background: var(--white); 
            max-width: 450px; 
            width: 100%; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            border-top: 5px solid var(--accent-cyan); 
        }
        
        h2 { text-align: center; color: var(--navy-blue); margin-bottom: 1.5rem; font-weight: 800; }
        .sub-text { text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem; }
        
        .form-group { margin-bottom: 1.2rem; position: relative; }
        
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: var(--navy-blue); }
        
        input { 
            width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border); 
            border-radius: 6px; font-size: 1rem; transition: all 0.3s ease; outline: none;
        }
        input[type="password"], input[type="text"] { padding-right: 2.8rem; }
        input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 3px rgba(0, 160, 223, 0.1); }
        
        .password-wrapper { position: relative; }
        .toggle-password { 
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%); 
            background: none; border: none; cursor: pointer; color: #94a3b8;
            display: flex; align-items: center; justify-content: center; padding: 5px;
        }
        .toggle-password:hover { color: var(--accent-cyan); }

        .btn-primary { 
            width: 100%; background-color: var(--brand-yellow); color: var(--navy-blue); 
            border: none; padding: 1rem; border-radius: 6px; font-size: 1.05rem; 
            font-weight: 800; cursor: pointer; transition: background-color 0.3s ease; 
            margin-top: 1rem; 
        }
        .btn-primary:hover { background-color: var(--yellow-hover); }
        .btn-primary:disabled { background-color: #e2e8f0; color: #a0aec0; cursor: not-allowed; }
        
        .message-box { 
            margin-bottom: 1.5rem; font-size: 0.9rem; text-align: center; 
            font-weight: 600; padding: 0.8rem; border-radius: 6px; display: none; 
        }
        
        .register-link { display: block; text-align: center; margin-top: 1.5rem; color: #64748b; text-decoration: none; font-size: 0.95rem; font-weight: 500; }
        .register-link span { color: var(--accent-cyan); font-weight: 800; }
        .register-link:hover span { color: var(--navy-blue); text-decoration: underline; }

        .forgot-password { display: block; text-align: right; margin-top: 0.5rem; font-size: 0.85rem; color: var(--accent-cyan); font-weight: 600; text-decoration: none; cursor: pointer; background: none; border: none; padding: 0; font-family: inherit; }
        .forgot-password:hover { text-decoration: underline; color: var(--navy-blue); }

        .hidden { display: none !important; }

        /* Loading spinner inside button */
        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid var(--navy-blue);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <a href="index.html" class="auth-logo">ENET SUPREME <br><span>ACADEMY</span></a>
    
    <!-- LOGIN SECTION -->
    <section class="auth-card" id="login-section">
        <h2>Gateway Portal</h2>
        <div class="message-box" id="auth-message"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" required placeholder="your@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password">
                    <button type="button" class="toggle-password" id="toggle-login-pw" aria-label="Toggle password visibility">
                        <!-- Eye Open Icon -->
                        <svg id="eye-open-login" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <!-- Eye Slash Icon (hidden by default) -->
                        <svg id="eye-slash-login" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                <button type="button" class="forgot-password" id="forgot-pw-btn">Forgot Password?</button>
            </div>
            <button type="submit" class="btn-primary" id="login-btn">Secure Log In</button>
        </form>

        <a href="register.html" class="register-link">Don't have an account? <span>Apply here</span></a>
    </section>

    <!-- RESET PASSWORD SECTION -->
    <section class="auth-card hidden" id="reset-section">
        <h2>Reset Password</h2>
        <p class="sub-text">Enter your email address and we'll send you a secure link to reset your password.</p>
        <div class="message-box" id="reset-message"></div>
        
        <form id="reset-form">
            <div class="form-group">
                <label for="reset-email">Email Address</label>
                <input type="email" id="reset-email" required placeholder="your@email.com" autocomplete="email">
            </div>
            <button type="submit" class="btn-primary" id="reset-btn">Send Reset Link</button>
        </form>

        <a href="#" class="register-link" id="back-to-login-btn">Back to <span>Secure Log In</span></a>
    </section>

    <!-- SET NEW PASSWORD SECTION -->
    <section class="auth-card hidden" id="update-section">
        <h2>Set New Password</h2>
        <p class="sub-text">Welcome back! Please enter your new secure password below.</p>
        <div class="message-box" id="update-message"></div>
        
        <form id="update-form">
            <div class="form-group">
                <label for="new-password">New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="new-password" required placeholder="••••••••" minlength="6" autocomplete="new-password">
                    <button type="button" class="toggle-password" id="toggle-new-pw" aria-label="Toggle password visibility">
                        <svg id="eye-open-new" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg id="eye-slash-new" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-primary" id="update-btn">Update Password</button>
        </form>
    </section>

    <!-- ✅ Load Supabase FIRST, then run all logic after it's ready -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ── CONFIG ──────────────────────────────────────────────────────────
        const SUPABASE_URL = 'https://lskwzcvexyxjncttvimf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxza3d6Y3ZleHl4am5jdHR2aW1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTIzNjEsImV4cCI6MjA4ODU4ODM2MX0.W8sEQ2ZtmBe-oqsznCX_UinJ2Jz2NNe0LuQct33VP2E';

        // ✅ Supabase is now guaranteed to be available since script is placed after the CDN tag
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ── HELPERS ─────────────────────────────────────────────────────────
        function showMessage(elementId, text, isError) {
            const el = document.getElementById(elementId);
            el.style.display = 'block';
            el.style.backgroundColor = isError ? '#fee2e2' : '#e0f2fe';
            el.style.color = isError ? '#DC2626' : 'var(--navy-blue)';
            el.textContent = text;
        }

        function hideMessage(elementId) {
            document.getElementById(elementId).style.display = 'none';
        }

        function setLoading(btnId, loading, defaultText) {
            const btn = document.getElementById(btnId);
            btn.disabled = loading;
            btn.innerHTML = loading
                ? `<span class="spinner"></span> Please wait...`
                : defaultText;
        }

        function toggleEye(inputId, openIconId, slashIconId) {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            document.getElementById(openIconId).style.display = isPassword ? 'none' : 'inline';
            document.getElementById(slashIconId).style.display = isPassword ? 'inline' : 'none';
        }

        function showSection(id) {
            ['login-section', 'reset-section', 'update-section'].forEach(s => {
                document.getElementById(s).classList.toggle('hidden', s !== id);
            });
        }

        // ── INIT: Check URL hash for password recovery link ─────────────────
        window.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash;
            if (hash && hash.includes('type=recovery')) {
                showSection('update-section');
            }

            // ── FORM SUBMIT LISTENERS (no inline onsubmit needed) ────────────
            document.getElementById('login-form').addEventListener('submit', function(e) {
                e.preventDefault();
                attemptLogin();
            });

            document.getElementById('reset-form').addEventListener('submit', function(e) {
                e.preventDefault();
                attemptPasswordReset();
            });

            document.getElementById('update-form').addEventListener('submit', function(e) {
                e.preventDefault();
                updatePassword();
            });

            // ── BUTTON LISTENERS ─────────────────────────────────────────────
            document.getElementById('forgot-pw-btn').addEventListener('click', function() {
                hideMessage('auth-message');
                hideMessage('reset-message');
                // Pre-fill reset email from login email field
                document.getElementById('reset-email').value = document.getElementById('login-email').value;
                showSection('reset-section');
            });

            document.getElementById('back-to-login-btn').addEventListener('click', function(e) {
                e.preventDefault();
                hideMessage('auth-message');
                hideMessage('reset-message');
                showSection('login-section');
            });

            document.getElementById('toggle-login-pw').addEventListener('click', function() {
                toggleEye('login-password', 'eye-open-login', 'eye-slash-login');
            });

            document.getElementById('toggle-new-pw').addEventListener('click', function() {
                toggleEye('new-password', 'eye-open-new', 'eye-slash-new');
            });
        });

        // ── LOGIN ────────────────────────────────────────────────────────────
        async function attemptLogin() {
            setLoading('login-btn', true, 'Secure Log In');
            hideMessage('auth-message');

            try {
                const email    = document.getElementById('login-email').value.trim();
                const password = document.getElementById('login-password').value;

                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw new Error('Invalid email or password. Please try again.');

                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('role, status')
                    .eq('id', data.user.id)
                    .single();

                if (profileError || !profile) throw new Error('Profile not found. Please contact support.');

                if (profile.role !== 'admin' && profile.status === 'pending') {
                    await supabase.auth.signOut();
                    throw new Error('Your account is pending Admin approval. Please check back later.');
                }

                showMessage('auth-message', '✅ Success! Redirecting you now...', false);

                const redirectUrl = new URLSearchParams(window.location.search).get('redirect');

                setTimeout(() => {
                    if (redirectUrl)                    window.location.href = redirectUrl;
                    else if (profile.role === 'admin')  window.location.href = 'admin-dashboard.html';
                    else if (profile.role === 'teacher') window.location.href = 'teacher-dashboard.html';
                    else                                window.location.href = 'student-dashboard.html';
                }, 800);

            } catch (err) {
                showMessage('auth-message', err.message, true);
                setLoading('login-btn', false, 'Secure Log In');
            }
        }

        // ── REQUEST PASSWORD RESET EMAIL ─────────────────────────────────────
        async function attemptPasswordReset() {
            setLoading('reset-btn', true, 'Send Reset Link');
            hideMessage('reset-message');

            const email = document.getElementById('reset-email').value.trim();

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/login.html',
                });

                if (error) throw error;

                showMessage('reset-message', '📧 If an account exists for that email, a reset link has been sent. Check your inbox (and spam folder).', false);

            } catch (err) {
                showMessage('reset-message', 'Error: ' + err.message, true);
            } finally {
                setLoading('reset-btn', false, 'Send Reset Link');
            }
        }

        // ── UPDATE PASSWORD (after clicking reset email link) ────────────────
        async function updatePassword() {
            setLoading('update-btn', true, 'Update Password');
            hideMessage('update-message');

            const newPassword = document.getElementById('new-password').value;

            try {
                const { error } = await supabase.auth.updateUser({ password: newPassword });
                if (error) throw error;

                showMessage('update-message', '✅ Password updated! Redirecting to login...', false);

                setTimeout(() => {
                    window.location.href = window.location.pathname;
                }, 2500);

            } catch (err) {
                showMessage('update-message', 'Error: ' + err.message, true);
                setLoading('update-btn', false, 'Update Password');
            }
        }
    </script>
</body>
</html>
