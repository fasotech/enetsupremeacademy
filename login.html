<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENET SUPREME ACADEMY | Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --navy-blue: #02014a; 
            --brand-yellow: #fcd116; 
            --yellow-hover: #e0b800; 
            --accent-cyan: #00a0df; 
            --text-main: #333333; 
            --background: #F8F9FA; 
            --white: #FFFFFF; 
            --border: #E2E8F0; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--background); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1.5rem; }
        
        .auth-logo { color: var(--navy-blue); font-size: 2.2rem; font-weight: 800; margin-bottom: 2rem; text-transform: uppercase; text-align: center; letter-spacing: 1px; text-decoration: none; }
        .auth-logo span { color: var(--brand-yellow); }
        
        .auth-card { background: var(--white); max-width: 450px; width: 100%; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 5px solid var(--accent-cyan); }
        
        h2 { text-align: center; color: var(--navy-blue); margin-bottom: 1.5rem; font-weight: 800; }
        .sub-text { text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: var(--navy-blue); }
        input { width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; outline: none; transition: all 0.3s ease; }
        input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 3px rgba(0,160,223,0.1); }
        
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 2.8rem; }
        .toggle-password { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #94a3b8; display: flex; align-items: center; padding: 4px; }
        .toggle-password:hover { color: var(--accent-cyan); }

        .btn-primary { width: 100%; background-color: var(--brand-yellow); color: var(--navy-blue); border: none; padding: 1rem; border-radius: 6px; font-size: 1.05rem; font-weight: 800; cursor: pointer; transition: background-color 0.3s ease; margin-top: 1rem; }
        .btn-primary:hover { background-color: var(--yellow-hover); }
        .btn-primary:disabled { background-color: #e2e8f0; color: #a0aec0; cursor: not-allowed; }
        
        .message-box { margin-bottom: 1.5rem; font-size: 0.9rem; text-align: center; font-weight: 600; padding: 0.8rem; border-radius: 6px; display: none; line-height: 1.5; }
        
        .register-link { display: block; text-align: center; margin-top: 1.5rem; color: #64748b; text-decoration: none; font-size: 0.95rem; font-weight: 500; }
        .register-link span { color: var(--accent-cyan); font-weight: 800; }
        .register-link:hover span { color: var(--navy-blue); text-decoration: underline; }

        .forgot-link { display: block; text-align: right; margin-top: 0.4rem; font-size: 0.85rem; color: var(--accent-cyan); font-weight: 600; cursor: pointer; background: none; border: none; padding: 0; font-family: inherit; }
        .forgot-link:hover { text-decoration: underline; color: var(--navy-blue); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <a href="index.html" class="auth-logo">ENET SUPREME <br><span>ACADEMY</span></a>

    <section class="auth-card" id="login-section">
        <h2>Gateway Portal</h2>
        <div class="message-box" id="auth-message"></div>

        <form id="login-form" onsubmit="event.preventDefault(); attemptLogin(); return false;">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="login-password" required placeholder="••••••••">
                    <button type="button" class="toggle-password" onclick="togglePw('login-password', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <button type="button" class="forgot-link" onclick="showSection('reset-section')">Forgot Password?</button>
            </div>
            <button type="submit" class="btn-primary" id="login-btn">Secure Log In</button>
        </form>

        <a href="register.html" class="register-link">Don't have an account? <span>Apply here</span></a>
    </section>

    <section class="auth-card hidden" id="reset-section">
        <h2>Reset Password</h2>
        <p class="sub-text">Enter your email and we'll send you a secure reset link.</p>
        <div class="message-box" id="reset-message"></div>

        <form id="reset-form" onsubmit="event.preventDefault(); attemptPasswordReset(); return false;">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="reset-email" required placeholder="your@email.com">
            </div>
            <button type="submit" class="btn-primary" id="reset-btn">Send Reset Link</button>
        </form>

        <a href="#" class="register-link" onclick="showSection('login-section'); return false;">Back to <span>Secure Log In</span></a>
    </section>

    <section class="auth-card hidden" id="update-section">
        <h2>Set New Password</h2>
        <p class="sub-text">Welcome back! Enter your new password below.</p>
        <div class="message-box" id="update-message"></div>

        <form id="update-form" onsubmit="event.preventDefault(); updatePassword(); return false;">
            <div class="form-group">
                <label>New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="new-password" required placeholder="••••••••" minlength="6">
                    <button type="button" class="toggle-password" onclick="togglePw('new-password', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-primary" id="update-btn">Update Password</button>
        </form>
    </section>

    <script>
        // ── SUPABASE CONFIG ────────────────────────────────────────────────────
        var SUPA_URL = 'https://lskwzcvexyxjncttvimf.supabase.co';
        var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxza3d6Y3ZleHl4am5jdHR2aW1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTIzNjEsImV4cCI6MjA4ODU4ODM2MX0.W8sEQ2ZtmBe-oqsznCX_UinJ2Jz2NNe0LuQct33VP2E';

        function getSupabase() {
            if (typeof window.supabase === 'undefined') {
                throw new Error("Cannot connect to the database. Please check your internet connection or disable any adblockers.");
            }
            return window.supabase.createClient(SUPA_URL, SUPA_KEY);
        }

        // ── UI HELPERS ─────────────────────────────────────────────────────────
        function showMessage(id, text, isError) {
            var el = document.getElementById(id);
            el.style.display = 'block';
            el.style.backgroundColor = isError ? '#fee2e2' : '#e0f2fe';
            el.style.color = isError ? '#DC2626' : 'var(--navy-blue)';
            el.innerText = text;
        }

        function showSection(id) {
            ['login-section', 'reset-section', 'update-section'].forEach(function(s) {
                document.getElementById(s).classList.toggle('hidden', s !== id);
            });
            if (id === 'reset-section') {
                var loginEmail = document.getElementById('login-email').value;
                if (loginEmail) document.getElementById('reset-email').value = loginEmail;
            }
        }

        function togglePw(inputId, btn) {
            var input = document.getElementById(inputId);
            var eyeOpen  = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
            var eyeSlash = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
            if (input.type === 'password') { input.type = 'text';     btn.innerHTML = eyeSlash; }
            else                           { input.type = 'password'; btn.innerHTML = eyeOpen;  }
        }

        // ── CHECK IF RETURNING FROM PASSWORD RECOVERY EMAIL ────────────────────
        window.addEventListener('DOMContentLoaded', function() {
            if (window.location.hash && window.location.hash.includes('type=recovery')) {
                showSection('update-section');
            }
        });

        // ── LOGIN ──────────────────────────────────────────────────────────────
        async function attemptLogin() {
            var btn = document.getElementById('login-btn');
            btn.disabled = true;
            showMessage('auth-message', 'Authenticating securely...', false);

            try {
                var supabase = getSupabase(); 

                var email    = document.getElementById('login-email').value;
                var password = document.getElementById('login-password').value;

                var { data, error } = await supabase.auth.signInWithPassword({ email: email, password: password });
                if (error) throw new Error("Invalid email or password.");

                var { data: profile, error: profileError } = await supabase
                    .from('profiles').select('role, status').eq('id', data.user.id).single();
                if (profileError || !profile) throw new Error("Profile not found in database.");

                if (profile.role !== 'admin' && profile.status === 'pending') {
                    await supabase.auth.signOut();
                    throw new Error("Your account is pending Admin approval. Please check back later.");
                }

                showMessage('auth-message', 'Success! Redirecting...', false);

                var redirectUrl = new URLSearchParams(window.location.search).get('redirect');
                if (redirectUrl)                     window.location.href = redirectUrl;
                else if (profile.role === 'admin')   window.location.href = 'admin-dashboard.html';
                else if (profile.role === 'teacher') window.location.href = 'teacher-dashboard.html';
                else                                 window.location.href = 'student-dashboard.html';

            } catch (err) {
                showMessage('auth-message', err.message, true);
                try { getSupabase().auth.signOut(); } catch(e) {}
                btn.disabled = false;
            }
        }

        // ── SEND RESET EMAIL ───────────────────────────────────────────────────
        async function attemptPasswordReset() {
            var btn = document.getElementById('reset-btn');
            btn.disabled = true;
            showMessage('reset-message', 'Sending reset link...', false);

            try {
                var supabase = getSupabase();
                var email    = document.getElementById('reset-email').value;

                var { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/login.html'
                });
                if (error) throw error;

                // NEW SPAM INSTRUCTIONS ADDED HERE
                showMessage('reset-message', 'If an account matches that email, a reset link has been sent.\n\nIMPORTANT: Please check your Spam/Junk box, mark the email as "Safe" or "Not Spam", and then tap on the link through your inbox.', false);

            } catch (err) {
                showMessage('reset-message', 'Error: ' + err.message, true);
            } finally {
                btn.disabled = false;
            }
        }

        // ── UPDATE PASSWORD (after user clicks reset link from email) ──────────
        async function updatePassword() {
            var btn = document.getElementById('update-btn');
            btn.disabled = true;
            showMessage('update-message', 'Updating your password...', false);

            try {
                var supabase    = getSupabase();
                var newPassword = document.getElementById('new-password').value;

                var { error } = await supabase.auth.updateUser({ password: newPassword });
                if (error) throw error;

                showMessage('update-message', 'Password updated successfully! Redirecting to login...', false);
                setTimeout(function() { window.location.href = window.location.pathname; }, 2500);

            } catch (err) {
                showMessage('update-message', 'Error: ' + err.message, true);
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
